<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>物料库存查找</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#667085;--line:#e5e7eb;--main:#2563eb;--ok:#16a34a;--danger:#dc2626}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif}.wrap{max-width:520px;margin:0 auto;padding:28px 14px 32px}h1{font-size:26px;margin:0 0 6px}.sub{margin:0 0 18px;color:var(--muted);font-size:14px}.box,.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(16,24,40,.06)}.box{padding:14px;position:relative}.row{display:flex;gap:8px}input,button,select{font:inherit}#q{flex:1;min-width:0;border:1px solid var(--line);border-radius:14px;padding:14px;font-size:16px;outline:none;background:#fff}#q:focus{border-color:var(--main);box-shadow:0 0 0 4px rgba(37,99,235,.12)}.searchBtn{width:88px;background:var(--main);color:#fff;border:0;border-radius:14px;font-weight:800}.suggest{display:none;margin-top:8px;border:1px solid var(--line);border-radius:14px;background:#fff;max-height:310px;overflow:auto}.suggest.show{display:block}.opt{padding:12px;border-bottom:1px solid var(--line)}.opt:last-child{border-bottom:0}.optName{font-weight:800;font-size:15px;line-height:1.35}.optMeta{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.5}.status{margin-top:10px;padding:8px 10px;border-radius:12px;background:#ecfdf5;color:#166534;font-size:12px}.status.warn{background:#fff7ed;color:#9a3412}.result{margin-top:14px}.empty{text-align:center;color:var(--muted);padding:28px 12px}.card{padding:16px}.name{font-weight:900;font-size:18px;line-height:1.4;margin-bottom:12px}.info{display:grid;grid-template-columns:80px 1fr;gap:9px 10px;font-size:15px}.label{color:var(--muted)}.stockBlock{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;align-items:center}.stockNum{font-size:38px;font-weight:900}.badge{font-size:12px;border-radius:999px;padding:5px 9px;background:#eef2ff;color:#3730a3}.ops{margin-top:16px;display:grid;gap:10px}.opChoice{display:grid;grid-template-columns:1fr 1fr;gap:8px}.opChoice label{border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;font-weight:800;background:#fff}.opChoice input{margin-right:5px}.qty{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center;font-size:18px}.confirm{background:#111827;color:#fff;border:0;border-radius:12px;padding:13px;font-weight:900}.admin{display:none;margin-top:10px;padding:12px;border:1px dashed var(--line);border-radius:14px;background:#fff}.admin.show{display:block}.foot{margin:14px 4px 0;color:var(--muted);font-size:12px;line-height:1.6}.smallBtn{background:#111827;color:#fff;border:0;border-radius:12px;padding:11px;width:100%;margin-top:10px;font-weight:800}
</style>
</head>
<body>
<div class="wrap">
  <h1>物料库存查找</h1>
  <p class="sub">输入关键词，先在下拉菜单选择商品，再点搜索。</p>

  <div class="box">
    <div class="row">
      <input id="q" placeholder="输入商品名关键词" autocomplete="off">
      <button class="searchBtn" onclick="showSelected()">搜索</button>
    </div>
    <div id="suggest" class="suggest"></div>
    <div id="status" class="status warn">正在连接云端库存库…</div>
    <div id="admin" class="admin">
      <input id="file" type="file" accept=".xlsx,.xls,.csv">
      <div class="foot">管理员导入库存Excel，读取“库存汇总表”，上传/覆盖云端商品库。</div>
    </div>
  </div>

  <div id="result" class="result"></div>
  <div class="foot">库存加减会保存到云端，别人打开同一网页也能看到最新库存。<br><button class="smallBtn" onclick="toggleAdmin()">显示/隐藏导入Excel</button></div>
</div>

<script>
const SUPABASE_URL='https://inbmgdatkevuymzgubbp.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_f1hBGCH7niwi54Vcr0hkIA_rE0W_BsJ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let rawItems=[];
let candidateItem=null;
let displayedItem=null;
let suggestItems=[];
const aliases={code:['商品编码','商品条码','编码','条码','SKU','sku','货号'],name:['商品名','商品名称','名称','品名','货品名称'],stock:['当前库存','库存数量','库存','数量','可用库存','实际库存'],location:['库位','库位号','货位','仓位','位置']};
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function setStatus(t,ok=false){const el=document.getElementById('status');el.textContent=t;el.className='status'+(ok?'':' warn')}
function pick(row,keys){for(const k of keys){if(row[k]!=null&&String(row[k]).trim()!==''&&String(row[k]).trim()!=='#N/A')return row[k]}return ''}
function makeId(x){return String(x.code||x.name).trim()}
function normalizeRows(rows){return rows.map(r=>{const x={code:String(pick(r,aliases.code)||'').trim(),name:String(pick(r,aliases.name)||'').trim(),stock:Number(String(pick(r,aliases.stock)||0).replace(/,/g,''))||0,location:String(pick(r,aliases.location)||'未填写').trim()||'未填写'};return {...x,id:makeId(x)}}).filter(x=>x.name&&x.id)}
async function loadItems(){setStatus('正在从云端读取库存…');const {data,error}=await sb.from('inventory_items').select('*').order('name',{ascending:true}).limit(5000);if(error){setStatus('读取失败：'+error.message);return}rawItems=data||[];if(displayedItem){displayedItem=rawItems.find(x=>x.id===displayedItem.id)||displayedItem}setStatus(`已连接云端库存库，共 ${rawItems.length} 个商品`,true);renderResult()}
function matchItems(q){q=q.trim().toLowerCase();if(!q)return [];const parts=q.split(/\s+/).filter(Boolean);return rawItems.filter(it=>{const s=(it.name+' '+(it.code||'')+' '+(it.location||'')).toLowerCase();return parts.every(p=>s.includes(p))}).slice(0,20)}
function renderSuggest(){const q=document.getElementById('q').value;suggestItems=matchItems(q);const box=document.getElementById('suggest');if(!q.trim()||!suggestItems.length){box.className='suggest';box.innerHTML='';return}box.className='suggest show';box.innerHTML=suggestItems.map((it,i)=>`<div class="opt" onclick="chooseSuggestion(${i})"><div class="optName">${esc(it.name)}</div><div class="optMeta">编码：${esc(it.code||'未填写')}　库位：${esc(it.location||'未填写')}　库存：${Number(it.stock||0)}</div></div>`).join('')}
function chooseSuggestion(i){candidateItem=suggestItems[i];if(!candidateItem)return;document.getElementById('q').value=candidateItem.name;document.getElementById('suggest').className='suggest';document.getElementById('suggest').innerHTML='';document.getElementById('result').innerHTML='<div class="empty">已选择商品，请点击“搜索”查看库位和库存。</div>'}
function showSelected(){if(!candidateItem){const q=document.getElementById('q').value.trim();const matches=matchItems(q);if(matches.length===1)candidateItem=matches[0];else{document.getElementById('result').innerHTML='<div class="empty">请先在下拉菜单中选择一个商品。</div>';renderSuggest();return}}displayedItem=candidateItem;renderResult()}
function stockBadge(n){if(n<=0)return '<span class="badge" style="background:#fee2e2;color:#991b1b">缺货/0库存</span>';if(n<=2)return '<span class="badge" style="background:#fef3c7;color:#92400e">低库存</span>';return '<span class="badge">正常</span>'}
function renderResult(){const box=document.getElementById('result');if(!rawItems.length){box.innerHTML='<div class="empty">云端商品库为空。请先导入Excel。</div>';return}if(!displayedItem){box.innerHTML='';return}const it=displayedItem;const n=Number(it.stock||0);box.innerHTML=`<div class="card"><div class="name">${esc(it.name)}</div><div class="info"><div class="label">商品编码</div><div>${esc(it.code||'未填写')}</div><div class="label">库位</div><div><b>${esc(it.location||'未填写')}</b></div></div><div class="stockBlock"><div><div class="label">当前库存</div><div class="stockNum">${n}</div></div>${stockBadge(n)}</div><div class="ops"><div class="opChoice"><label><input type="radio" name="op" value="plus" checked>加库存</label><label><input type="radio" name="op" value="minus">减库存</label></div><input id="qty" class="qty" type="number" inputmode="numeric" min="0" placeholder="输入数量，如 1"><button class="confirm" onclick="confirmChange()">确认</button></div></div>`}
async function confirmChange(){if(!displayedItem)return alert('请先搜索商品。');const qtyEl=document.getElementById('qty');let qty=Number(qtyEl.value||0);if(!Number.isFinite(qty)||qty<=0)return alert('请输入大于0的数量。');const op=document.querySelector('input[name="op"]:checked').value;const dir=op==='plus'?1:-1;const newStock=Number(displayedItem.stock||0)+dir*qty;if(newStock<0&&!confirm('库存将变成负数，确定继续？'))return;setStatus('正在保存库存变更…');const {data,error}=await sb.from('inventory_items').update({stock:newStock,updated_at:new Date().toISOString()}).eq('id',displayedItem.id).select().single();if(error){setStatus('保存失败：'+error.message);return}const idx=rawItems.findIndex(x=>x.id===displayedItem.id);if(idx>=0)rawItems[idx]=data;displayedItem=data;candidateItem=data;setStatus('库存已保存并同步到云端',true);renderResult()}
async function importRows(rows){const items=normalizeRows(rows);if(!items.length)return alert('没有识别到商品名/库存数据');if(!confirm(`将导入/覆盖 ${items.length} 个商品的当前库存，确定继续？`))return;setStatus('正在上传Excel库存到云端…');for(let i=0;i<items.length;i+=500){const batch=items.slice(i,i+500).map(x=>({id:x.id,code:x.code,name:x.name,location:x.location,stock:x.stock,updated_at:new Date().toISOString()}));const {error}=await sb.from('inventory_items').upsert(batch,{onConflict:'id'});if(error){setStatus('导入失败：'+error.message);return}}alert(`已导入/更新 ${items.length} 个商品`);candidateItem=null;displayedItem=null;document.getElementById('q').value='';await loadItems()}
function toggleAdmin(){document.getElementById('admin').classList.toggle('show')}
document.getElementById('q').addEventListener('input',()=>{candidateItem=null;displayedItem=null;document.getElementById('result').innerHTML='';renderSuggest()});
document.getElementById('q').addEventListener('focus',renderSuggest);
document.getElementById('file').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const buf=await f.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const sheetName=wb.SheetNames.includes('库存汇总表')?'库存汇总表':wb.SheetNames[0];const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:''});await importRows(rows)});
sb.channel('inventory_items_changes').on('postgres_changes',{event:'UPDATE',schema:'public',table:'inventory_items'},payload=>{const idx=rawItems.findIndex(x=>x.id===payload.new.id);if(idx>=0)rawItems[idx]=payload.new;if(displayedItem&&displayedItem.id===payload.new.id){displayedItem=payload.new;candidateItem=payload.new;setStatus('收到其他用户的库存更新',true);renderResult()}}).subscribe();
loadItems();
</script>
</body>
</html>
