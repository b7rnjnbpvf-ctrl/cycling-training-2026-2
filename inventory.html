<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>手机在线物料库存查找</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#141821;--muted:#667085;--line:#e6e8ef;--main:#2563eb;--ok:#16a34a;--danger:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}.wrap{max-width:520px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 14px 28px}.hero{padding:18px 4px 12px}h1{font-size:24px;line-height:1.15;margin:0 0 8px}.sub,.tips,.foot,.label{color:var(--muted)}.sub{margin:0;font-size:13px}.searchCard,.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(16,24,40,.06)}.searchCard{padding:12px;position:sticky;top:8px;z-index:10}input,button{font:inherit}#q{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px;outline:none;font-size:16px;background:#fff}#q:focus{border-color:var(--main);box-shadow:0 0 0 4px rgba(37,99,235,.12)}.tips{display:flex;justify-content:space-between;gap:10px;margin:10px 2px 0;font-size:12px}.list{margin-top:14px;display:grid;gap:10px}.card{padding:14px}.name{font-weight:700;font-size:16px;line-height:1.35;margin-bottom:8px}.meta{display:grid;grid-template-columns:74px 1fr;gap:6px 8px;font-size:14px}.stockLine{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}.stock{font-size:28px;font-weight:800}.badge{padding:4px 8px;border-radius:999px;font-size:12px;background:#eef2ff;color:#3730a3}.ops{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.delta{grid-column:1/3;width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;font-size:18px}button{border:0;border-radius:12px;padding:12px 10px;font-weight:700;color:#fff}.minus{background:var(--danger)}.plus{background:var(--ok)}.empty{text-align:center;color:var(--muted);padding:30px 12px}.foot{margin:14px 4px 0;font-size:12px;line-height:1.6}.smallBtn{background:#111827;width:100%;margin-top:10px}.fileBox{margin-top:10px;padding:12px;border:1px dashed var(--line);border-radius:14px;background:#fff}.fileBox input{width:100%;font-size:14px}.hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero"><h1>物料库存查找</h1><p class="sub">手机单机版：商品名查询、库位显示、库存加减</p></div>
  <div class="searchCard">
    <input id="q" placeholder="输入商品名，例如：A字网球裙" autocomplete="off">
    <div class="tips"><span id="count">商品库载入中…</span><span>库存变更保存在本手机</span></div>
    <div class="fileBox">
      <input id="file" type="file" accept=".xlsx,.xls,.csv">
      <div class="hint">首次打开请导入“库存管理2026.6.9.xlsx”。网页会读取“库存汇总表”，并保存到当前手机浏览器。后续打开无需重复导入。</div>
    </div>
  </div>
  <div id="list" class="list"></div>
  <div class="foot">第一版为单机手机在线网页：查商品、看库位/库存，并用加减框调整库存。调整结果保存在当前手机浏览器，不会自动写回Excel。<br><button class="smallBtn" onclick="resetAll()">清空本机数据并重新导入</button></div>
</div>
<script>
const DATA_KEY='mobile_inventory_items_20260609';
const STOCK_KEY='mobile_inventory_stock_20260609';
let rawItems=JSON.parse(localStorage.getItem(DATA_KEY)||'[]');
let stockMap=JSON.parse(localStorage.getItem(STOCK_KEY)||'{}');
let currentItems=[];
const aliases={code:['商品编码','商品条码','编码','条码','SKU','sku','货号'],name:['商品名','商品名称','名称','品名','货品名称'],stock:['库存数量','库存','数量','可用库存','实际库存'],location:['库位','库位号','货位','仓位','位置']};
function pick(row,keys){for(const k of keys){if(row[k]!=null&&String(row[k]).trim()!=='')return row[k]}return ''}
function normalizeRows(rows){return rows.map(r=>({code:String(pick(r,aliases.code)||'').trim(),name:String(pick(r,aliases.name)||'').trim(),stock:Number(String(pick(r,aliases.stock)||0).replace(/,/g,''))||0,location:String(pick(r,aliases.location)||'未填写').trim()||'未填写'})).filter(x=>x.name)}
function getStock(item){const key=item.code||item.name;return Object.prototype.hasOwnProperty.call(stockMap,key)?Number(stockMap[key]):Number(item.stock||0)}
function saveStock(item,val){stockMap[item.code||item.name]=Number(val);localStorage.setItem(STOCK_KEY,JSON.stringify(stockMap))}
function matchItems(q){q=q.trim().toLowerCase();if(!q)return rawItems.slice(0,20);const parts=q.split(/\s+/).filter(Boolean);return rawItems.filter(it=>{const s=(it.name+' '+it.code+' '+it.location).toLowerCase();return parts.every(p=>s.includes(p))}).slice(0,50)}
function stockBadge(n){if(n<=0)return '<span class="badge" style="background:#fee2e2;color:#991b1b">缺货/0库存</span>';if(n<=2)return '<span class="badge" style="background:#fef3c7;color:#92400e">低库存</span>';return '<span class="badge">正常</span>'}
function render(){const q=document.getElementById('q').value;const items=matchItems(q);currentItems=items;document.getElementById('count').textContent=rawItems.length?`共 ${rawItems.length} 个商品，当前显示 ${items.length} 个`:'未导入商品库';const list=document.getElementById('list');if(!rawItems.length){list.innerHTML='<div class="empty">请先导入库存Excel文件</div>';return}if(!items.length){list.innerHTML='<div class="empty">没有找到匹配商品，请换个关键词</div>';return}list.innerHTML=items.map((it,i)=>{const n=getStock(it);return `<div class="card"><div class="name">${esc(it.name)}</div><div class="meta"><div class="label">商品编码</div><div>${esc(it.code||'未填写')}</div><div class="label">库位</div><div><b>${esc(it.location||'未填写')}</b></div></div><div class="stockLine"><div><div class="label">当前库存</div><div class="stock">${n}</div></div>${stockBadge(n)}</div><div class="ops"><input class="delta" id="delta-${i}" type="number" inputmode="numeric" min="0" placeholder="输入加减数量，如 1"><button class="minus" onclick="changeStock(${i},-1)">− 减库存</button><button class="plus" onclick="changeStock(${i},1)">＋ 加库存</button></div></div>`}).join('')}
function changeStock(i,dir){const it=currentItems[i];const el=document.getElementById('delta-'+i);let d=Number(el.value||1);if(!Number.isFinite(d)||d<=0)d=1;saveStock(it,getStock(it)+dir*d);render()}
function resetAll(){if(confirm('确定清空本机商品库和库存调整记录？')){localStorage.removeItem(DATA_KEY);localStorage.removeItem(STOCK_KEY);rawItems=[];stockMap={};render()}}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
document.getElementById('q').addEventListener('input',render);
document.getElementById('file').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const buf=await f.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const sheetName=wb.SheetNames.includes('库存汇总表')?'库存汇总表':wb.SheetNames[0];const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:''});rawItems=normalizeRows(rows);localStorage.setItem(DATA_KEY,JSON.stringify(rawItems));stockMap={};localStorage.setItem(STOCK_KEY,JSON.stringify(stockMap));alert(`已导入 ${rawItems.length} 个商品，数据表：${sheetName}`);render()});
render();
</script>
</body>
</html>
