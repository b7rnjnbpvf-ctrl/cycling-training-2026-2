<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>手机在线物料库存查找</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#141821;--muted:#667085;--line:#e6e8ef;--main:#2563eb;--ok:#16a34a;--danger:#dc2626;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}.wrap{max-width:520px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 14px 28px}.hero{padding:18px 4px 12px}h1{font-size:24px;line-height:1.15;margin:0 0 8px}.sub,.tips,.foot,.label,.hint{color:var(--muted)}.sub{margin:0;font-size:13px}.searchCard,.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(16,24,40,.06)}.searchCard{padding:12px;position:sticky;top:8px;z-index:10}input,button{font:inherit}#q{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px;outline:none;font-size:16px;background:#fff}#q:focus{border-color:var(--main);box-shadow:0 0 0 4px rgba(37,99,235,.12)}.tips{display:flex;justify-content:space-between;gap:10px;margin:10px 2px 0;font-size:12px}.status{font-size:12px;padding:8px 10px;border-radius:12px;background:#fff7ed;color:#9a3412;margin-top:10px}.status.ok{background:#ecfdf5;color:#166534}.list{margin-top:14px;display:grid;gap:10px}.card{padding:14px}.name{font-weight:700;font-size:16px;line-height:1.35;margin-bottom:8px}.meta{display:grid;grid-template-columns:74px 1fr;gap:6px 8px;font-size:14px}.stockLine{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}.stock{font-size:28px;font-weight:800}.badge{padding:4px 8px;border-radius:999px;font-size:12px;background:#eef2ff;color:#3730a3}.ops{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.delta{grid-column:1/3;width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;font-size:18px}button{border:0;border-radius:12px;padding:12px 10px;font-weight:700;color:#fff}.minus{background:var(--danger)}.plus{background:var(--ok)}.empty{text-align:center;color:var(--muted);padding:30px 12px}.foot{margin:14px 4px 0;font-size:12px;line-height:1.6}.smallBtn{background:#111827;width:100%;margin-top:10px}.fileBox{margin-top:10px;padding:12px;border:1px dashed var(--line);border-radius:14px;background:#fff}.fileBox input{width:100%;font-size:14px}.hint{font-size:12px;margin-top:8px;line-height:1.5}.admin{display:none}.admin.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero"><h1>物料库存查找</h1><p class="sub">手机联网同步版：别人打开同一个网页也能查库存、改库存并保存</p></div>
  <div class="searchCard">
    <input id="q" placeholder="输入商品名，例如：A字网球裙" autocomplete="off">
    <div class="tips"><span id="count">商品库载入中…</span><span id="syncText">同步状态检查中</span></div>
    <div id="status" class="status">正在连接云端库存库…</div>
    <div id="admin" class="fileBox admin">
      <input id="file" type="file" accept=".xlsx,.xls,.csv">
      <div class="hint">管理员导入库存Excel。网页读取“库存汇总表”，并上传/覆盖云端商品库。导入前建议先备份原表。</div>
    </div>
  </div>
  <div id="list" class="list"></div>
  <div class="foot">所有人打开同一个网址看到同一份云端库存。库存加减会保存到 Supabase。<br><button class="smallBtn" onclick="toggleAdmin()">显示/隐藏导入Excel</button></div>
</div>
<script>
const SUPABASE_URL = 'https://inbmgdatkevuymzgubbp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_f1hBGCH7niwi54Vcr0hkIA_rE0W_BsJ';
const isConfigured = SUPABASE_URL.startsWith('https://') && SUPABASE_ANON_KEY.length > 30;
const sb = isConfigured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let rawItems=[];let currentItems=[];
const aliases={code:['商品编码','商品条码','编码','条码','SKU','sku','货号'],name:['商品名','商品名称','名称','品名','货品名称'],stock:['当前库存','库存数量','库存','数量','可用库存','实际库存'],location:['库位','库位号','货位','仓位','位置']};
function setStatus(text,ok=false){const el=document.getElementById('status');el.textContent=text;el.className='status'+(ok?' ok':'');document.getElementById('syncText').textContent=ok?'云端同步':'未同步'}
function pick(row,keys){for(const k of keys){if(row[k]!=null&&String(row[k]).trim()!==''&&String(row[k]).trim()!=='#N/A')return row[k]}return ''}
function makeId(x){return String(x.code||x.name).trim()}
function normalizeRows(rows){return rows.map(r=>{const x={code:String(pick(r,aliases.code)||'').trim(),name:String(pick(r,aliases.name)||'').trim(),stock:Number(String(pick(r,aliases.stock)||0).replace(/,/g,''))||0,location:String(pick(r,aliases.location)||'未填写').trim()||'未填写'};return {...x,id:makeId(x)}}).filter(x=>x.name&&x.id)}
async function loadItems(){if(!isConfigured){setStatus('数据库未配置。');document.getElementById('list').innerHTML='<div class="empty">数据库未配置，暂不能多人同步保存</div>';return}setStatus('正在从云端读取库存…');const {data,error}=await sb.from('inventory_items').select('*').order('name',{ascending:true}).limit(5000);if(error){setStatus('读取失败：'+error.message);return}rawItems=data||[];setStatus('已连接云端库存库',true);render()}
function matchItems(q){q=q.trim().toLowerCase();if(!q)return rawItems.slice(0,30);const parts=q.split(/\s+/).filter(Boolean);return rawItems.filter(it=>{const s=(it.name+' '+(it.code||'')+' '+(it.location||'')).toLowerCase();return parts.every(p=>s.includes(p))}).slice(0,60)}
function stockBadge(n){if(n<=0)return '<span class="badge" style="background:#fee2e2;color:#991b1b">缺货/0库存</span>';if(n<=2)return '<span class="badge" style="background:#fef3c7;color:#92400e">低库存</span>';return '<span class="badge">正常</span>'}
function render(){const q=document.getElementById('q').value;const items=matchItems(q);currentItems=items;document.getElementById('count').textContent=rawItems.length?`共 ${rawItems.length} 个商品，当前显示 ${items.length} 个`:'未导入商品库';const list=document.getElementById('list');if(!rawItems.length){list.innerHTML='<div class="empty">云端商品库为空。点击下方“显示/隐藏导入Excel”，导入库存表后即可使用。</div>';return}if(!items.length){list.innerHTML='<div class="empty">没有找到匹配商品，请换个关键词</div>';return}list.innerHTML=items.map((it,i)=>{const n=Number(it.stock||0);return `<div class="card"><div class="name">${esc(it.name)}</div><div class="meta"><div class="label">商品编码</div><div>${esc(it.code||'未填写')}</div><div class="label">库位</div><div><b>${esc(it.location||'未填写')}</b></div></div><div class="stockLine"><div><div class="label">当前库存</div><div class="stock">${n}</div></div>${stockBadge(n)}</div><div class="ops"><input class="delta" id="delta-${i}" type="number" inputmode="numeric" min="0" placeholder="输入加减数量，如 1"><button class="minus" onclick="changeStock(${i},-1)">− 减库存</button><button class="plus" onclick="changeStock(${i},1)">＋ 加库存</button></div></div>`}).join('')}
async function changeStock(i,dir){if(!isConfigured)return alert('还没有配置云数据库，不能同步保存。');const it=currentItems[i];const el=document.getElementById('delta-'+i);let d=Number(el.value||1);if(!Number.isFinite(d)||d<=0)d=1;const newStock=Number(it.stock||0)+dir*d;if(newStock<0&&!confirm('库存将变成负数，确定继续？'))return;setStatus('正在保存库存变更…');const {data,error}=await sb.from('inventory_items').update({stock:newStock,updated_at:new Date().toISOString()}).eq('id',it.id).select().single();if(error){setStatus('保存失败：'+error.message);return}const idx=rawItems.findIndex(x=>x.id===it.id);if(idx>=0)rawItems[idx]=data;setStatus('库存已保存并同步到云端',true);render()}
async function importRows(rows){const items=normalizeRows(rows);if(!items.length)return alert('没有识别到商品名/库存数据');if(!confirm(`将导入/覆盖 ${items.length} 个商品的当前库存，确定继续？`))return;setStatus('正在上传Excel库存到云端…');for(let i=0;i<items.length;i+=500){const batch=items.slice(i,i+500).map(x=>({id:x.id,code:x.code,name:x.name,location:x.location,stock:x.stock,updated_at:new Date().toISOString()}));const {error}=await sb.from('inventory_items').upsert(batch,{onConflict:'id'});if(error){setStatus('导入失败：'+error.message);return}}alert(`已导入/更新 ${items.length} 个商品`);await loadItems()}
function toggleAdmin(){document.getElementById('admin').classList.toggle('show')}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
document.getElementById('q').addEventListener('input',render);
document.getElementById('file').addEventListener('change',async e=>{if(!isConfigured)return alert('请先配置 Supabase。');const f=e.target.files[0];if(!f)return;const buf=await f.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const sheetName=wb.SheetNames.includes('库存汇总表')?'库存汇总表':wb.SheetNames[0];const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:''});await importRows(rows)});
if(isConfigured){sb.channel('inventory_items_changes').on('postgres_changes',{event:'UPDATE',schema:'public',table:'inventory_items'},payload=>{const idx=rawItems.findIndex(x=>x.id===payload.new.id);if(idx>=0){rawItems[idx]=payload.new;render();setStatus('收到其他用户的库存更新',true)}}).subscribe()}
loadItems();
</script>
</body>
</html>
