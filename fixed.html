<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>骑行训练修正版</title><style>:root{--bg:#f5f7fb;--card:#fff;--text:#101828;--muted:#667085;--line:#e4e7ec;--blue:#2563eb;--soft:#eff6ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}header,main,footer{max-width:980px;margin:auto;padding:14px}h1{font-size:25px;margin:8px 0 4px}h2{font-size:20px;margin:0 0 10px}.muted{color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 24px rgba(15,23,42,.06);padding:14px;margin:12px 0}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-end}.settings{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:320px}input,select,textarea,button{font:inherit;font-size:16px;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;width:100%}button{background:var(--blue);color:#fff;border:0;font-weight:700}.ghost{background:#fff;color:var(--blue);border:1px solid #bfdbfe}.danger{background:#b91c1c}.filters{display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:8px}.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}.list{display:grid;gap:10px}.item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.item.active{outline:3px solid #bfdbfe}.date{font-size:17px;font-weight:800}.line{font-weight:700;margin-top:6px;white-space:pre-wrap}.small{font-size:12px;color:var(--muted);line-height:1.5}.pill{display:inline-block;background:var(--soft);color:#1d4ed8;border-radius:999px;padding:3px 8px;font-size:12px;margin:3px 4px 3px 0}.done{background:#ecfdf3;color:#067647}.detail-section{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#fafafa}.step{display:grid;grid-template-columns:60px 1fr;gap:8px;margin:8px 0}.step b{color:#475467}.text{white-space:pre-wrap;line-height:1.55}.loggrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0}.analysis{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px;margin:10px 0;line-height:1.55}.records{display:grid;gap:10px}.record{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.tools{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.hide{display:none}@media(max-width:760px){header,main,footer{padding:12px}.top{display:block}.settings{max-width:none;margin-top:10px}.filters{grid-template-columns:1fr 1fr}.filters input{grid-column:1/3}.layout{grid-template-columns:1fr}.loggrid{grid-template-columns:1fr 1fr}.tools{grid-template-columns:1fr}.quick button{padding:9px 4px}}</style></head><body><header><div class="top"><div><div class="muted">2026 骑行训练 · 修正版 v6</div><h1>每日训练计划与记录</h1><div class="small">修复：分类简化、课程内容不再 undefined、6.8 为周一。</div></div><div class="settings"><input id="ftp" type="number" inputmode="numeric" placeholder="FTP" value="180"><input id="kg" type="number" inputmode="decimal" step="0.1" placeholder="体重" value="62"><button style="grid-column:1/3" onclick="saveSettings()">保存 FTP / 体重</button></div></div></header><main><section class="card"><div class="filters"><select id="weekSel" onchange="renderList()"><option value="all">全部周次</option></select><select id="typeSel" onchange="renderList()"><option value="all">全部类型</option><option>休息/出行</option><option>健身</option><option>阈值/甜点</option><option>VO2/混合</option><option>长有氧</option><option>其他</option></select><input id="search" oninput="renderList()" placeholder="搜索：阈值 / VO2 / 出行 / 恢复"></div></section><section class="layout"><div class="card"><h2>课程列表</h2><div id="list" class="list">读取中...</div></div><div class="card"><h2>每日训练详细内容</h2><div id="detail" class="muted">点击左侧课程。</div></div></section><section class="card"><h2>记录卡片</h2><div id="records" class="records"></div></section><section class="card"><h2>数据备份</h2><div class="small">记录保存在本机 Safari。换手机、清理浏览器前先导出 JSON。</div><div class="tools"><button onclick="exportJSON()">导出 JSON</button><button onclick="exportCSV()">导出 CSV</button><button class="ghost" onclick="importFile.click()">导入 JSON</button></div><input id="importFile" class="hide" type="file" accept="application/json" onchange="importJSON(event)"><button class="danger" style="margin-top:8px" onclick="clearLogs()">清空本机记录</button></section></main><footer class="muted">打开 fixed.html?v=6；如显示旧版，请关闭标签页重新打开。</footer><script>let settings=JSON.parse(localStorage.ct_settings||'{"ftp":180,"kg":62}'),logs=JSON.parse(localStorage.ct_logs||'{}'),plan=[],selected=null;ftp.value=settings.ftp;kg.value=settings.kg;const WDS={'周一':0,'周二':1,'周三':2,'周四':3,'周五':4,'周六':5,'周日':6};function cat(t){t=t||'';if(/休息|出行|无法/.test(t))return'休息/出行';if(/健身/.test(t))return'健身';if(/VO2|高强|变速|混合|密度/.test(t))return'VO2/混合';if(/长有氧|耐力|恢复耐力|减量长有氧/.test(t))return'长有氧';if(/阈值|甜点|稳态|开腿|测试|基准/.test(t))return'阈值/甜点';return'其他'}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function weekNum(s){return +(String(s||'').replace(/[^0-9]/g,'')||0)}function rowStart(x){return /^\s*(快速恢复期|Build\s*\d+|夏季|秋季|年末|20\d{2}-\d{2}-\d{2})\t/.test(x)}function rebuildRows(raw){let lines=raw.replace(/\r/g,'').split('\n'),rows=[],cur='';for(const line of lines){if(rowStart(line)){if(cur)rows.push(cur);cur=line}else if(cur){cur+='\n'+line}}if(cur)rows.push(cur);return rows}function parseRaw(raw){let rows=rebuildRows(raw),out=[],base=new Date(Date.UTC(2026,3,20));for(const r of rows){let a=r.split('\t');if(a.length<8)continue;let phase=a[0],week=weekNum(a[1]),weekday=a[2],type=a[3];if(!week||!WDS.hasOwnProperty(weekday))continue;let date=new Date(base.getTime()+((week-1)*7+WDS[weekday])*86400000).toISOString().slice(0,10);let key=week+'-'+weekday;if(out.some(x=>x.key===key))continue;out.push({key,id:'w'+week+weekday,date,week,weekday,phase,type,cat:cat(type),warm:a[4]||'-',main:a[5]||'-',cool:a[6]||'-',duration:a[7]||'-',note:a[8]||'',ftp:a[9]||''})}return out}function genFuture(){const base=new Date(Date.UTC(2026,3,20));let arr=[];['周一','周二','周三','周四','周五','周六','周日'].forEach(()=>{});for(let w=14;w<=37;w++){for(const wd of Object.keys(WDS)){let i=WDS[wd],date=new Date(base.getTime()+((w-1)*7+i)*86400000).toISOString().slice(0,10),phase=w<=21?'Build 3 / 200W专项':w<=29?'夏季维持':w<=35?'秋季再提升':'年末恢复';let type='休息',warm='-',main='-',cool='-',duration='-',note='固定恢复';if(wd==='周三'){type='健身';warm='动态热身 8-10m';main='维持型力量：深蹲/分腿蹲/臀桥/核心，2-3组，不力竭';cool='拉伸放松';duration='约40-50m';note='不影响周四'}else if(wd==='周二'){type='阈值/甜点';warm='15m ramp 45-80%';main=w%4===1?'3x\n• 8m 90-92%\n• 5m 50%':'4x\n• 10m 92-96%\n• 5m 50%';cool='10m ramp 50-30%';duration='约60-80m';note='周二关键课'}else if(wd==='周四'){type='稳态甜点';warm='12m ramp 45-75%';main=w%4===1?'60m 65-72%':'2-3x\n• 25m 88-90%\n• 6m 40-50%';cool='8-10m easy';duration='约75-110m';note='稳定心率'}else if(wd==='周六'){type='VO2 / 混合';warm='12-15m ramp 45-85%';main=w%4===1?'45-60m Z2 60-70%':'5x\n• 3m 108-112%\n• 3m 55-60%';cool='10m easy';duration='约60-75m';note='状态差可降为Z2'}else if(wd==='周日'){type='长有氧';warm='10-15m 45-70%';main=w%4===1?'75-90m 65-72%':'120-180m 70-73%';cool='10m 60-30%';duration='约95-200m';note='长Z2，关注补给和心率解耦'}arr.push({key:w+'-'+wd,id:'g'+w+wd,date,week:w,weekday:wd,phase,type,cat:cat(type),warm,main,cool,duration,note,ftp:''})}}return arr}async function init(){try{let html=await fetch('index.html?rawsrc='+Date.now()).then(r=>r.text());let m=html.match(/const RAW=`([\s\S]*?)`;\nconst DOW/);if(!m)throw Error('找不到原始课程数据');plan=parseRaw(m[1]).concat(genFuture());for(let i=1;i<=37;i++)weekSel.innerHTML+=`<option value="${i}">第${i}周</option>`;weekSel.value='8';renderList();let s=plan.find(x=>x.date==='2026-06-08');if(s)select(s.id)}catch(e){list.textContent='读取失败：'+e.message}}function pctToWatts(text){let f=+settings.ftp||180;return String(text??'-').replace(/(\d+)(?:-(\d+))?%/g,(m,a,b)=>b?`${m}（${Math.round(f*a/100)}-${Math.round(f*b/100)}W）`:`${m}（${Math.round(f*a/100)}W）`)}function renderList(){let w=weekSel.value,t=typeSel.value,q=search.value.trim();list.innerHTML='';plan.filter(s=>(w==='all'||s.week==w)&&(t==='all'||s.cat===t)&&(!q||JSON.stringify(s).includes(q))).forEach(s=>{let l=logs[s.id],d=document.createElement('div');d.className='item'+(selected&&selected.id===s.id?' active':'');d.onclick=()=>select(s.id);let first=(s.main&&s.main!=='-'?s.main:s.note||'').split('\n').slice(0,2).join('\n');d.innerHTML=`<div class="date">${s.date} ${s.weekday}</div><span class="pill">第${s.week}周</span><span class="pill">${esc(s.cat)}</span><span class="pill">${esc(s.type)}</span>${l?'<span class="pill done">已记录</span>':''}<div class="line">${esc(first||'-')}</div><div class="small">${esc(s.phase)}｜${esc(s.duration)}</div>`;list.appendChild(d)});renderRecords()}function block(a,b){return `<div class="step"><b>${a}</b><div class="text">${esc(pctToWatts(b||'-'))}</div></div>`}function select(id){selected=plan.find(x=>x.id===id);let l=logs[id]||{};detail.innerHTML=`<div class="date">${selected.date} ${selected.weekday}</div><span class="pill">第${selected.week}周</span><span class="pill">${esc(selected.phase)}</span><span class="pill">${esc(selected.type)}</span>${selected.ftp?`<span class="pill">建议FTP ${selected.ftp}W</span>`:''}<div class="detail-section">${block('热身',selected.warm)}${block('主课',selected.main)}${block('放松',selected.cool)}${block('备注',selected.note)}<div class="small">预计时长：${esc(selected.duration)}</div></div><form onsubmit="saveLog(event)"><div class="quick"><button type="button" class="ghost" onclick="setComp(60)">60%</button><button type="button" class="ghost" onclick="setComp(80)">80%</button><button type="button" class="ghost" onclick="setComp(100)">100%</button><button type="button" class="ghost" onclick="setComp(110)">超额</button></div><div class="loggrid"><input name="ap" placeholder="AP 平均功率" inputmode="numeric" value="${l.ap||''}"><input name="np" placeholder="NP 标准化功率" inputmode="numeric" value="${l.np||''}"><input name="hr" placeholder="平均心率" inputmode="numeric" value="${l.hr||''}"><input name="maxhr" placeholder="最高心率" inputmode="numeric" value="${l.maxhr||''}"><input name="min" placeholder="时长 分钟" inputmode="decimal" value="${l.min||''}"><input name="dist" placeholder="距离 km" inputmode="decimal" value="${l.dist||''}"><input name="rpe" placeholder="RPE 1-10" inputmode="decimal" value="${l.rpe||''}"><input name="comp" placeholder="完成度 %" inputmode="numeric" value="${l.comp||''}"></div><textarea name="note" rows="3" placeholder="腿感、心率、睡眠、补给、天气">${l.note||''}</textarea><div id="ana" class="analysis">填写 NP/AP/时长后自动分析。</div><button>保存记录卡片</button></form>`;detail.querySelector('form').oninput=calc;calc();renderList()}function setComp(v){detail.querySelector('[name=comp]').value=v;calc()}function calc(){let f=detail.querySelector('form');if(!f)return;let np=+f.np.value,ap=+f.ap.value,min=+f.min.value,rpe=+f.rpe.value,comp=+f.comp.value,ftpv=+settings.ftp||180;let txt=[];if(np)txt.push('IF '+(np/ftpv).toFixed(2));if(np&&min)txt.push('TSS≈'+Math.round(min*Math.pow(np/ftpv,2)*100/60));if(ap&&min)txt.push('kJ≈'+Math.round(ap*min*60/1000));if(np&&ap)txt.push('VI '+(np/ap).toFixed(2));let adv=comp>=90&&rpe&&rpe<=7?'完成质量好，可继续按计划。':((comp&&comp<75)||rpe>=8?'压力偏高，下一课建议降级或缩短。':'记录后结合体感判断下一课。');ana.textContent=(txt.length?txt.join('｜')+'。':'')+adv}function saveLog(e){e.preventDefault();let f=e.target;logs[selected.id]={date:selected.date,week:selected.week,weekday:selected.weekday,type:selected.type,ap:f.ap.value,np:f.np.value,hr:f.hr.value,maxhr:f.maxhr.value,min:f.min.value,dist:f.dist.value,rpe:f.rpe.value,comp:f.comp.value,note:f.note.value,ts:new Date().toISOString()};localStorage.ct_logs=JSON.stringify(logs);renderList();select(selected.id)}function renderRecords(){let arr=Object.entries(logs).reverse();records.innerHTML=arr.length?'':'暂无训练记录';arr.forEach(([id,l])=>{let d=document.createElement('div');d.className='record';d.innerHTML=`<b>${l.date} ${l.weekday}｜第${l.week}周｜${esc(l.type)}</b><div>AP ${l.ap||'-'}W / NP ${l.np||'-'}W / HR ${l.hr||'-'} / RPE ${l.rpe||'-'} / 完成度 ${l.comp||'-'}%</div><div class="small">${esc(l.note||'')}</div>`;records.appendChild(d)})}function saveSettings(){settings={ftp:+ftp.value||180,kg:+kg.value||62};localStorage.ct_settings=JSON.stringify(settings);renderList();if(selected)select(selected.id)}function exportJSON(){download('cycling-training-backup.json',JSON.stringify({settings,logs},null,2),'application/json')}function exportCSV(){let rows=['date,weekday,week,type,ap,np,hr,maxhr,min,dist,rpe,completion,note'].concat(Object.values(logs).map(l=>[l.date,l.weekday,l.week,l.type,l.ap,l.np,l.hr,l.maxhr,l.min,l.dist,l.rpe,l.comp,'"'+String(l.note||'').replaceAll('"','""')+'"'].join(',')));download('cycling-training-records.csv',rows.join('\n'),'text/csv')}function download(n,t,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type}));a.download=n;a.click()}function importJSON(e){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);if(data.settings)settings=data.settings;if(data.logs)logs=data.logs;localStorage.ct_settings=JSON.stringify(settings);localStorage.ct_logs=JSON.stringify(logs);location.reload()}catch(err){alert('导入失败')}};r.readAsText(file)}function clearLogs(){if(confirm('确认清空本机记录？')){logs={};localStorage.ct_logs='{}';renderList()}}init();</script></body></html>
