<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AI英语生词学习助手</title><style>:root{--bg:#f6f9fb;--card:#fff;--text:#162033;--muted:#718096;--primary:#2f80ed;--soft:#e9f2ff;--ok:#16a34a;--warn:#f59e0b;--danger:#ef4444;--line:#e6edf3}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#eef6ff 0%,var(--bg) 32%);color:var(--text)}button,input,textarea{font:inherit}button{border:0;border-radius:14px;padding:12px 14px;background:var(--primary);color:#fff;font-weight:700}button.ghost{background:var(--soft);color:var(--primary)}button.light{background:#f1f5f9;color:#334155}.app{max-width:480px;margin:0 auto;min-height:100vh;padding:18px 14px 86px}.top{display:flex;justify-content:space-between;align-items:center;margin:6px 2px 16px}.title{font-size:22px;font-weight:900}.sub{color:var(--muted);font-size:13px;margin-top:3px}.pill{background:#fff;border:1px solid var(--line);padding:7px 10px;border-radius:999px;font-size:12px;color:var(--muted)}.card{background:rgba(255,255,255,.95);border:1px solid var(--line);box-shadow:0 10px 30px rgba(47,128,237,.08);border-radius:22px;padding:16px;margin:12px 0}.section-title{font-size:17px;font-weight:850;margin:0 0 10px}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;background:#fbfdff;outline:none}.textarea{min-height:104px;resize:vertical}.row{display:flex;gap:10px;align-items:center}.row>*{flex:1}.actions{display:flex;gap:10px;margin-top:10px}.result{margin-top:12px;padding:12px;border-radius:16px;background:#f8fafc;color:#334155;line-height:1.55}.tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:10}.tab{background:transparent;color:#64748b;padding:7px 2px;border-radius:12px;font-size:11px;font-weight:800}.tab.active{background:var(--soft);color:var(--primary)}.word{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.word h3{margin:0;font-size:19px}.tag{display:inline-flex;align-items:center;border-radius:999px;background:#eef6ff;color:#2563eb;padding:4px 9px;font-size:12px;font-weight:800}.muted{color:var(--muted);font-size:13px}.examples{padding-left:18px;margin:10px 0 0;color:#334155}.examples li{margin:6px 0}.filters{display:flex;gap:8px;overflow:auto;padding:2px 0 8px}.chip{white-space:nowrap;background:#fff;border:1px solid var(--line);border-radius:999px;color:#475569;padding:8px 11px}.chip.active{background:var(--primary);color:white;border-color:var(--primary)}.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.num{font-size:20px;font-weight:900}.small{font-size:12px;color:var(--muted)}.hidden{display:none}.test-option{width:100%;text-align:left;margin:7px 0;background:#f8fafc;color:#334155;border:1px solid var(--line)}.test-option.correct{background:#eaf8ef;color:#166534;border-color:#bbf7d0}.test-option.wrong{background:#fff1f2;color:#be123c;border-color:#fecdd3}.empty{text-align:center;padding:28px 8px;color:var(--muted)}</style></head><body><main class="app"><div class="top"><div><div class="title">AI 英语生词学习助手</div><div class="sub">翻译 · 生词本 · 测试 · 口语 · 间隔复习</div></div><div class="pill" id="todayCount">今日 0</div></div><section id="home" class="page"></section><section id="book" class="page hidden"></section><section id="test" class="page hidden"></section><section id="speak" class="page hidden"></section><section id="history" class="page hidden"></section><section id="review" class="page hidden"></section></main><nav class="tabs" id="tabs"></nav><script>const cats=['全部','商务','日常','校园','旅行','科技','考试','口语','其他'];let state=JSON.parse(localStorage.getItem('englishApp')||'null')||{tab:'home',filter:'全部',historyFilter:'全部',items:[{id:'1',text:'efficient',type:'word',phonetic:'/ɪˈfɪʃənt/',partOfSpeech:'adj.',definitionCn:'高效的；效率高的',definitionEn:'working well without wasting time or energy',category:'商务',examples:[['We need a more efficient process.','我们需要一个更高效的流程。'],['This app helps me learn words efficiently.','这个应用帮助我高效学单词。'],['An efficient team saves time.','高效团队能节省时间。']],audioUrl:'',status:'学习中',masteryLevel:1,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),lastReviewedAt:null,nextReviewAt:new Date().toISOString(),isInCurrentBook:true},{id:'2',text:'book a hotel',type:'phrase',phonetic:'/bʊk ə həʊˈtel/',partOfSpeech:'phrase',definitionCn:'预订酒店',definitionEn:'to reserve a room in a hotel',category:'旅行',examples:[['I need to book a hotel for tonight.','我需要预订今晚的酒店。'],['Can you help me book a hotel near the station?','你能帮我订车站附近的酒店吗？'],['We booked a hotel online.','我们在网上订了酒店。']],audioUrl:'',status:'学习中',masteryLevel:2,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),lastReviewedAt:null,nextReviewAt:new Date(Date.now()+864e5).toISOString(),isInCurrentBook:true}],tests:[]};function save(){localStorage.setItem('englishApp',JSON.stringify(state))}function isEnglish(s){return/[a-zA-Z]/.test(s)}function categoryOf(t){t=t.toLowerCase();if(/meeting|client|process|efficient|business|price|order|invoice/.test(t))return'商务';if(/hotel|travel|station|ticket|flight/.test(t))return'旅行';if(/exam|test|homework|school|class/.test(t))return'校园';if(/computer|app|data|system|ai|technology/.test(t))return'科技';if(/ielts|toefl|cet|grammar/.test(t))return'考试';if(/talk|chat|speak|hello|thanks/.test(t))return'口语';return isEnglish(t)?'日常':'其他'}function mockAnalyze(text){let clean=text.trim(),isPhrase=clean.split(/\s+/).length>1,cat=categoryOf(clean);return{id:String(Date.now()),text:clean,type:isPhrase?'phrase':'word',phonetic:isEnglish(clean)?'/ˈmɒk fəˈnetɪk/':'',partOfSpeech:isPhrase?'phrase':'n./v./adj.',definitionCn:isEnglish(clean)?`“${clean}” 的中文释义（第一版 mock，后续可接入 OpenAI 自动生成）`:`${clean} 的英文表达`,definitionEn:isEnglish(clean)?`A detailed English explanation for "${clean}".`:'English expression generated from Chinese input.',category:cat,examples:[[`${clean} is useful in daily English.`,`${clean} 在日常英语中很有用。`],[`I try to use ${clean} in a sentence.`,`我尝试用 ${clean} 造句。`],[`Please remember ${clean} with context.`,`请结合语境记住 ${clean}。`]],audioUrl:'',status:'学习中',masteryLevel:1,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),lastReviewedAt:null,nextReviewAt:new Date().toISOString(),isInCurrentBook:true}}function speakText(text){if('speechSynthesis'in window){let u=new SpeechSynthesisUtterance(text);u.lang='en-US';speechSynthesis.speak(u)}}function dueItems(){let now=Date.now();return state.items.filter(i=>i.isInCurrentBook&&new Date(i.nextReviewAt).getTime()<=now)}function currentItems(){return state.items.filter(i=>i.isInCurrentBook)}function mastered(){return state.items.filter(i=>i.status==='已掌握')}const nav=[['home','首页'],['book','生词本'],['test','测试'],['speak','口语'],['history','历史'],['review','复习']];function setTab(t){state.tab=t;save();render()}function renderTabs(){tabs.innerHTML=nav.map(([id,n])=>`<button class="tab ${state.tab===id?'active':''}" onclick="setTab('${id}')">${n}</button>`).join('')}function wordCard(i,extra=''){return`<div class="card"><div class="word"><div><h3>${i.text}</h3><div class="muted">${i.phonetic} · ${i.partOfSpeech}</div></div><button class="ghost" onclick="speakText('${i.text.replaceAll("'","\\'")}')">🔊</button></div><p>${i.definitionCn}</p><div class="row"><span class="tag">${i.category}</span><span class="muted">阶段 ${i.masteryLevel} · 下次 ${new Date(i.nextReviewAt).toLocaleDateString()}</span></div><ol class="examples">${i.examples.map(e=>`<li>${e[0]}<br><span class="muted">${e[1]}</span></li>`).join('')}</ol>${extra}</div>`}function renderHome(){home.innerHTML=`<div class="statgrid"><div class="stat"><div class="num">${currentItems().length}</div><div class="small">当前生词</div></div><div class="stat"><div class="num">${dueItems().length}</div><div class="small">今日复习</div></div><div class="stat"><div class="num">${mastered().length}</div><div class="small">已掌握</div></div></div><div class="card"><h2 class="section-title">翻译</h2><textarea id="translateInput" class="input textarea" placeholder="输入中文或英文，支持中译英、英译中、单词翻译"></textarea><div class="actions"><button onclick="doTranslate()">翻译</button><button class="ghost" onclick="clearResult('translateResult')">清空</button></div><div id="translateResult" class="result hidden"></div></div><div class="card"><h2 class="section-title">添加生词 / 短语 / 句子</h2><textarea id="newWord" class="input textarea" placeholder="例如 efficient / book a hotel / 我想提高英语口语"></textarea><div class="actions"><button onclick="addWord()">分析并加入生词本</button></div><div class="muted" style="margin-top:10px">自动生成释义、分类、例句，并保存到历史词库。</div></div>`}function doTranslate(){let v=document.getElementById('translateInput').value.trim();if(!v)return;translateResult.innerHTML=isEnglish(v)?`<b>${v}</b><br>音标：/ˈmɒk/<br>词性：n./v./adj.<br>中文：${v} 的中文翻译和详细释义。<br>英文解释：Mock translation result, ready for OpenAI API integration.<br><button class="ghost" onclick="speakText('${v.replaceAll("'","\\'")}')">播放发音</button>`:`<b>${v}</b><br>英文翻译：Mock English translation for: ${v}<br><span class="muted">后续接入 OpenAI API 后可生成真实翻译。</span>`;translateResult.classList.remove('hidden')}function clearResult(id){document.getElementById(id).classList.add('hidden')}function addWord(){let el=document.getElementById('newWord'),v=el.value.trim();if(!v)return;state.items.unshift(mockAnalyze(v));save();el.value='';alert('已加入生词本，并保存到历史词库');render()}function renderBook(){let list=currentItems();if(state.filter!=='全部')list=list.filter(i=>i.category===state.filter);book.innerHTML=`<div class="card"><h2 class="section-title">当前生词本</h2><input class="input" placeholder="搜索生词" oninput="searchBook(this.value)"><div class="filters">${cats.map(c=>`<button class="chip ${state.filter===c?'active':''}" onclick="state.filter='${c}';save();render()">${c}</button>`).join('')}</div></div><div id="bookList">${list.length?list.map(i=>wordCard(i,`<div class="actions"><button class="light" onclick="removeCurrent('${i.id}')">移出当前生词本</button></div>`)).join(''):'<div class="empty">当前没有生词</div>'}</div>`}function searchBook(q){q=q.toLowerCase();document.getElementById('bookList').innerHTML=currentItems().filter(i=>i.text.toLowerCase().includes(q)).map(i=>wordCard(i,`<div class="actions"><button class="light" onclick="removeCurrent('${i.id}')">移出当前生词本</button></div>`)).join('')||'<div class="empty">没有找到</div>'}function removeCurrent(id){let i=state.items.find(x=>x.id===id);i.isInCurrentBook=false;i.status='已移出';save();render()}function renderTest(){let pool=dueItems().length?dueItems():currentItems(),i=pool[0];if(!i){test.innerHTML='<div class="card empty">暂无可测试生词，先去首页添加。</div>';return}let options=[i.definitionCn,'完全无关的意思','临时计划；预约','快速移动'].sort(()=>Math.random()-.5);test.innerHTML=`<div class="card"><h2 class="section-title">练习测试</h2><div class="muted">正确率达到 80% 后通过，当前第一版按单题演示。</div><h3>${i.text}</h3><p>请选择正确中文释义：</p>${options.map(o=>`<button class="test-option" onclick="answerTest('${i.id}',this,'${o.replaceAll("'","\\'")}')">${o}</button>`).join('')}<div id="testFeedback" class="result hidden"></div></div>`}function answerTest(id,btn,ans){let i=state.items.find(x=>x.id===id),ok=ans===i.definitionCn;btn.classList.add(ok?'correct':'wrong');state.tests.unshift({id:String(Date.now()),vocabularyItemId:id,testType:'英文选中文',question:i.text,userAnswer:ans,correctAnswer:i.definitionCn,isCorrect:ok,score:ok?100:0,createdAt:new Date().toISOString()});if(ok){i.status='已掌握';i.isInCurrentBook=false;i.masteryLevel=6;i.lastReviewedAt=new Date().toISOString();i.nextReviewAt=new Date(Date.now()+30*864e5).toISOString();testFeedback.innerHTML='回答正确：已从当前生词本移除，并保留在历史词库。'}else{i.status='需复习';i.nextReviewAt=new Date(Date.now()+864e5).toISOString();testFeedback.innerHTML='未通过：继续保留在当前生词本，明天再次复习。'}testFeedback.classList.remove('hidden');save();setTimeout(render,800)}function renderSpeak(){let i=currentItems()[0];speak.innerHTML=i?`<div class="card"><h2 class="section-title">口语练习</h2><div class="tag">场景：${i.category==='商务'?'商务会议':i.category==='旅行'?'旅行问路':'日常聊天'}</div><h3>目标词：${i.text}</h3><p>请用目标词回答：How would you use "${i.text}" in a real conversation?</p><div class="actions"><button onclick="mockRecord('${i.text.replaceAll("'","\\'")}')">🎙 开始录音</button><button class="ghost" onclick="speakText('${i.text.replaceAll("'","\\'")}')">播放目标词</button></div><div id="speechResult" class="result hidden"></div></div>`:'<div class="card empty">暂无口语练习词，先添加生词。</div>'}function mockRecord(t){speechResult.innerHTML=`识别结果：I want to use ${t} in my daily English.<br><br>AI 反馈：表达基本正确，已使用目标词。建议下一步把句子放入更真实的语境。`;speechResult.classList.remove('hidden')}function renderHistory(){let list=state.items;if(state.historyFilter!=='全部')list=list.filter(i=>i.status===state.historyFilter);history.innerHTML=`<div class="card"><h2 class="section-title">历史词库</h2><div class="filters">${['全部','学习中','需复习','已掌握','已移出'].map(s=>`<button class="chip ${state.historyFilter===s?'active':''}" onclick="state.historyFilter='${s}';save();render()">${s}</button>`).join('')}</div></div>${list.map(i=>wordCard(i,`<div class="muted">状态：${i.status} · ${i.isInCurrentBook?'当前生词本中':'不在当前生词本'}</div>`)).join('')||'<div class="empty">历史词库为空</div>'}`}function renderReview(){let now=Date.now(),due=state.items.filter(i=>i.isInCurrentBook&&new Date(i.nextReviewAt).getTime()<=now),soon=state.items.filter(i=>i.isInCurrentBook&&new Date(i.nextReviewAt).getTime()>now);review.innerHTML=`<div class="card"><h2 class="section-title">复习计划</h2><p class="muted">间隔重复：当天 → 1天 → 3天 → 7天 → 15天 → 30天。</p></div><div class="card"><h3>今日需复习</h3>${due.map(i=>`<p><b>${i.text}</b> <span class="tag">阶段${i.masteryLevel}</span></p>`).join('')||'<p class="muted">今天没有到期词。</p>'}</div><div class="card"><h3>即将复习</h3>${soon.map(i=>`<p><b>${i.text}</b><br><span class="muted">${new Date(i.nextReviewAt).toLocaleString()}</span></p>`).join('')||'<p class="muted">暂无即将复习词。</p>'}</div>`}function render(){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(state.tab).classList.remove('hidden');todayCount.textContent='今日 '+dueItems().length;renderTabs();({home:renderHome,book:renderBook,test:renderTest,speak:renderSpeak,history:renderHistory,review:renderReview}[state.tab])()}render();</script></body></html>
