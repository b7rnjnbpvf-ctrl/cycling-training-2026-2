<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="骑行训练"><meta name="theme-color" content="#2563eb">
<title>个人骑行训练记录与分析</title>
<style>
:root{--c:#fff;--t:#172033;--m:#667085;--l:#e6eaf2;--a:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(180deg,#eaf2ff,#f7f8fb 260px);color:var(--t)}header,main,footer{max-width:1180px;margin:auto;padding:18px}h1{font-size:30px;margin:8px 0}.sub,.muted{color:var(--m)}.card,.metric{background:var(--c);border:1px solid var(--l);border-radius:18px;box-shadow:0 10px 28px rgba(15,23,42,.07)}.top{display:grid;grid-template-columns:1fr 310px;gap:16px}.panel{padding:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}.metric{padding:14px}.metric span{display:block;color:var(--m);font-size:13px}.metric b{font-size:24px}label{display:block;font-size:13px;color:var(--m);margin:8px 0}input,select,textarea,button{width:100%;font:inherit;font-size:16px;border:1px solid var(--l);border-radius:12px;padding:10px;background:#fff}button{background:var(--a);color:#fff;border:0;font-weight:700;margin-top:8px}.danger{background:#b91c1c}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.layout{display:grid;grid-template-columns:1.5fr .9fr;gap:16px;margin-top:16px}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid var(--l);padding:10px;text-align:left;vertical-align:top}tr:hover{background:#f8fbff}.tag{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;background:#eef4ff;color:#1d4ed8}.done{background:#ecfdf3;color:#067647}.detail pre{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--l);border-radius:12px;padding:10px}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.records{display:grid;gap:10px}.record{padding:12px;border:1px solid var(--l);border-radius:14px;background:#fff}.small{font-size:12px;color:var(--m)}@media(max-width:760px){header,main,footer{padding:12px}.top,.layout{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.actions{grid-template-columns:1fr 1fr}table,thead,tbody,tr,td{display:block}thead{display:none}tr{border:1px solid var(--l);border-radius:14px;margin:10px 0;padding:8px;background:#fff}td{border:0;padding:6px 4px}td:before{content:attr(data-label);display:block;color:var(--m);font-size:12px}.formgrid{grid-template-columns:1fr}h1{font-size:24px}}
</style>
</head><body>
<header><div class="top"><div><div class="muted">Cycling Training 2026</div><h1>个人骑行训练记录与分析</h1><p class="sub">iPhone Safari / GitHub Pages 版。已修正日期逻辑：2026-06-08 正确显示为周一。</p></div><div class="card panel"><label>当前训练 FTP（W）<input id="ftp" type="number" inputmode="numeric" value="180"></label><label>体重（kg）<input id="kg" type="number" inputmode="decimal" value="62" step="0.1"></label><button onclick="saveSet()">保存设置</button></div></div></header>
<main>
<section class="grid"><div class="metric"><span>课程天数</span><b id="mTotal">-</b></div><div class="metric"><span>已记录</span><b id="mLogs">-</b></div><div class="metric"><span>最近完成度</span><b id="mComp">-</b></div><div class="metric"><span>训练建议</span><b id="mAdv">-</b><div class="small" id="mAdvTxt">等待记录</div></div></section>
<section class="card panel"><div class="actions"><select id="week" onchange="render()"><option value="all">全部周次</option></select><select id="type" onchange="render()"><option value="all">全部类型</option></select><input id="q" oninput="render()" placeholder="搜索：阈值 / Z2 / VO2"><button onclick="jumpToday()">最近课程</button><button onclick="exportJSON()">导出JSON</button><button onclick="exportCSV()">导出CSV</button><button class="danger" onclick="clearLogs()">清空记录</button></div></section>
<section class="layout"><div class="card panel"><h2>2026 全年课程</h2><div class="tablewrap"><table><thead><tr><th>日期</th><th>周次</th><th>星期</th><th>类型</th><th>主课</th><th>记录</th></tr></thead><tbody id="tbody"></tbody></table></div></div><aside class="card panel detail"><h2 id="dTitle">课程详情</h2><div id="dBox" class="muted">点击左侧课程开始记录。</div><form id="form" style="display:none" onsubmit="saveLog(event)"><div class="formgrid"><label>AP(W)<input name="ap" type="number" inputmode="numeric"></label><label>NP(W)<input name="np" type="number" inputmode="numeric"></label><label>平均心率<input name="hr" type="number" inputmode="numeric"></label><label>时长(分钟)<input name="min" type="number" inputmode="decimal" step="0.1"></label><label>RPE<input name="rpe" type="number" inputmode="decimal" min="1" max="10" step="0.5"></label><label>完成度%<input name="comp" type="number" inputmode="numeric" min="0" max="130"></label></div><label>备注<textarea name="note" rows="3"></textarea></label><div class="small" id="ana">填写 NP/AP 后自动计算 IF。</div><button>保存记录</button></form></aside></section>
<section class="card panel" style="margin-top:16px"><h2>训练记录</h2><div id="records" class="records"></div></section>
</main><footer class="muted">数据保存在本机 Safari localStorage。换手机、清理浏览器前请先导出 JSON 备份。</footer>
<script>
function localDate(y,m,d){return new Date(y,m-1,d,12,0,0)}
function fmtDate(dt){const y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,'0'),d=String(dt.getDate()).padStart(2,'0');return `${y}-${m}-${d}`}
function parseLocalDate(s){const [y,m,d]=s.split('-').map(Number);return localDate(y,m,d)}
const start=localDate(2026,4,20),end=localDate(2026,12,31);
const phases=[['快速恢复期',1,3],['FTP恢复建设',4,8],['巩固提升期',9,13],['200W专项推进',14,21],['夏季维持与有氧底盘',22,29],['秋季再提升',30,35],['年末恢复与总结',36,37]];
function phase(w){return phases.find(p=>w>=p[1]&&w<=p[2])?.[0]||'全年记录期'}
function pct(w,d){let a=w%4;if(d==1||d==5||d==3)return null;if(d==2)return a==0?'3x8m 92-95% + 4m恢复':'4-5x6m 98-102% + 4m恢复';if(d==4)return a==0?'60m Z2 60-70%':'2x25-35m 86-90% + 6m恢复';if(d==6)return a==0?'轻松 Z2 60m':'5-6x3m 110-115% + 3m恢复';if(d==0)return a==0?'Z2 75-90m 恢复长骑':'Z2 120-180m，心率稳定优先'}
function typ(d,w){if(d==1||d==5)return'休息';if(d==3)return'健身';if(d==2)return'阈值/甜点';if(d==4)return'Tempo/SS';if(d==6)return w%4==0?'Z2恢复':'VO2/混氧';if(d==0)return'Z2长有氧'}
function warm(d){if(d==1||d==5)return'完全休息';if(d==3)return'深蹲/分腿蹲/核心，控制总量，不练到力竭';return'热身15m：45-75%，含3次30s唤醒'}
function cool(d){if(d==1||d==5)return'-';if(d==3)return'拉伸与放松';return'放松10m：50%逐步降到30%'}
const plan=[];for(let dt=new Date(start);dt<=end;dt.setDate(dt.getDate()+1)){let diff=Math.round((dt-start)/86400000),w=Math.floor(diff/7)+1,d=dt.getDay();plan.push({id:'W'+String(w).padStart(2,'0')+'-'+d,date:fmtDate(dt),week:w,weekday:['周日','周一','周二','周三','周四','周五','周六'][d],phase:phase(w),type:typ(d,w),warm:warm(d),main:pct(w,d)||'-',cool:cool(d),note:w%4==0?'减量/恢复周：强度保留，容量下降':'按体感控制，RPE>8或心率异常则降级'})}
let settings=JSON.parse(localStorage.ct_settings||'{"ftp":180,"kg":62}'),logs=JSON.parse(localStorage.ct_logs||'{}'),sel=null;ftp.value=settings.ftp;kg.value=settings.kg;
function saveSet(){settings={ftp:+ftp.value||180,kg:+kg.value||62};localStorage.ct_settings=JSON.stringify(settings);stats();alert('已保存')}
for(let i=1;i<=37;i++)week.innerHTML+=`<option value="${i}">第${i}周</option>`;['休息','健身','阈值/甜点','Tempo/SS','VO2/混氧','Z2长有氧','Z2恢复'].forEach(x=>type.innerHTML+=`<option>${x}</option>`)
function render(){let qq=q.value.trim(),wf=week.value,tf=type.value;tbody.innerHTML='';plan.filter(s=>(wf=='all'||s.week==wf)&&(tf=='all'||s.type==tf)&&(!qq||JSON.stringify(s).includes(qq))).forEach(s=>{let l=logs[s.id],tr=document.createElement('tr');tr.id=s.id;tr.onclick=()=>select(s.id);tr.innerHTML=`<td data-label="日期">${s.date}</td><td data-label="周次">第${s.week}周</td><td data-label="星期">${s.weekday}</td><td data-label="类型"><span class="tag">${s.type}</span></td><td data-label="主课">${s.main}</td><td data-label="记录">${l?'<span class="tag done">已记录</span>':'<span class="tag">未记录</span>'}</td>`;tbody.appendChild(tr)});stats();records()}
function select(id){sel=plan.find(x=>x.id==id);let l=logs[id]||{};dTitle.textContent=`${sel.date} 第${sel.week}周 ${sel.weekday}`;dBox.innerHTML=`<pre>阶段：${sel.phase}\n类型：${sel.type}\n热身：${sel.warm}\n主课：${sel.main}\n放松：${sel.cool}\n备注：${sel.note}</pre>`;form.style.display='block';['ap','np','hr','min','rpe','comp','note'].forEach(k=>form[k].value=l[k]||'');ana.textContent='填写 NP/AP 后自动计算 IF。'}
form.oninput=()=>{let np=+form.np.value,ap=+form.ap.value,ifv=np/settings.ftp;ana.textContent=np?`IF≈${ifv.toFixed(2)}；NP/AP=${ap?(np/ap).toFixed(2):'-'}。${ifv>1?'强度很高，注意恢复':ifv>.88?'关键强度课':'有氧或恢复强度'}`:'填写 NP/AP 后自动计算 IF。'}
function saveLog(e){e.preventDefault();if(!sel)return;logs[sel.id]={date:sel.date,week:sel.week,type:sel.type,ap:form.ap.value,np:form.np.value,hr:form.hr.value,min:form.min.value,rpe:form.rpe.value,comp:form.comp.value,note:form.note.value,ts:new Date().toISOString()};localStorage.ct_logs=JSON.stringify(logs);render();select(sel.id)}
function stats(){let arr=Object.values(logs),ride=arr.filter(x=>+x.comp);mTotal.textContent=plan.length;mLogs.textContent=arr.length;let last=ride.slice(-7),avg=last.length?Math.round(last.reduce((a,b)=>a+(+b.comp||0),0)/last.length):0;mComp.textContent=last.length?avg+'%':'-';let rpes=last.map(x=>+x.rpe||0).filter(Boolean),ravg=rpes.length?rpes.reduce((a,b)=>a+b,0)/rpes.length:0;mAdv.textContent=avg>=90&&ravg<=7?'可小幅进阶':avg<75?'先恢复':'维持';mAdvTxt.textContent=avg>=90&&ravg<=7?'关键课完成好，可考虑FTP+2~3W或增加一组。':avg<75?'完成度偏低，下一周降容量或只保留一节关键课。':'继续按计划执行，观察心率和腿感。'}
function records(){let arr=Object.entries(logs).reverse();records.innerHTML=arr.length?'':'暂无记录';arr.forEach(([id,l])=>{let div=document.createElement('div');div.className='record';div.innerHTML=`<b>${l.date} 第${l.week}周 ${l.type}</b><div>AP ${l.ap||'-'}W / NP ${l.np||'-'}W / HR ${l.hr||'-'} / RPE ${l.rpe||'-'} / 完成度 ${l.comp||'-'}%</div><div class="small">${l.note||''}</div>`;records.appendChild(div)})}
function jumpToday(){let t=new Date(),near=plan.reduce((a,b)=>Math.abs(parseLocalDate(b.date)-t)<Math.abs(parseLocalDate(a.date)-t)?b:a,plan[0]);week.value=near.week;render();setTimeout(()=>document.getElementById(near.id)?.scrollIntoView({block:'center'}),50);select(near.id)}
function dl(name,text,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click()}
function exportJSON(){dl('cycling-training-backup.json',JSON.stringify({settings,logs},null,2),'application/json')}
function exportCSV(){let rows=['date,week,type,ap,np,hr,min,rpe,completion,note'].concat(Object.values(logs).map(l=>[l.date,l.week,l.type,l.ap,l.np,l.hr,l.min,l.rpe,l.comp,'"'+String(l.note||'').replaceAll('"','""')+'"'].join(',')));dl('cycling-training-records.csv',rows.join('\n'),'text/csv')}
function clearLogs(){if(confirm('确认清空本机训练记录？')){logs={};localStorage.ct_logs='{}';render()}}
render();
</script></body></html>
