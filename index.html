<header>
  <div class="top">
    <div><div class="muted">2026 骑行训练 · 简洁记录版 v5</div><h1>每日训练计划与记录</h1><div class="small">已按最新上传原始训练表更新；6.8 明确为周一。导入/导出放在页面最后。</div></div>

  </div>
</header>
<main>
  <section class="card">
    <div class="filters"><select id="weekSel" onchange="renderList()"><option value="all">全部周次</option></select><select id="typeSel" onchange="renderList()"><option value="all">全部类型</option></select><input id="search" oninput="renderList()" placeholder="搜索：阈值 / VO2 / 出行 / 恢复"></div>
  </section>
  <section class="layout">
    <div class="card"><h2>课程列表</h2><div id="list" class="list"></div></div>
    <div class="card"><h2>每日训练详细内容</h2><div id="detail" class="muted">点击左侧某一天，查看热身、主课、放松和备注，并填写记录卡片。</div></div>
  </section>
  <section class="card"><h2>记录卡片</h2><div id="records" class="records"></div></section>
  <section class="card"><h2>数据备份</h2><div class="small">训练记录保存在当前 iPhone Safari 本地。换手机、清理浏览器前，请先导出 JSON。</div><div class="tools"><button onclick="exportJSON()">导出 JSON</button><button onclick="exportCSV()">导出 CSV</button><button class="ghost" onclick="importFile.click()">导入 JSON</button></div><input id="importFile" class="hide" type="file" accept="application/json" onchange="importJSON(event)"><button class="danger" style="margin-top:8px" onclick="clearLogs()">清空本机记录</button></section>
</main>

2026-07-19	13	周日	Build 2	恢复有氧	10m easy	• 75-90m 65-72%	10m easy	约 95-110m	恢复	`;
const DOW=['周一','周二','周三','周四','周五','周六','周日'];
let settings=JSON.parse(localStorage.ct_settings||'{"ftp":180,"kg":62}'),logs=JSON.parse(localStorage.ct_logs||'{}'),selected=null;ftp.value=settings.ftp;kg.value=settings.kg;
function unesc(s){return (s||'').replace(/\\n/g,'\n')}
let plan=RAW.trim().split('\n').map((line,i)=>{let a=line.split('\t');return {id:'d'+i,date:a[0],week:+a[1],weekday:a[2],phase:a[3],type:a[4],warm:unesc(a[5]),main:unesc(a[6]),cool:unesc(a[7]),duration:a[8],note:a[9],ftp:a[10]||''}});
function addDays(iso,n){let [y,m,d]=iso.split('-').map(Number),dt=new Date(Date.UTC(y,m-1,d+n));return dt.toISOString().slice(0,10)}
function gen(w,idx,wd){let cut=w%4===1,phase=w<=21?'Build 3 / 200W专项':w<=29?'夏季维持':w<=35?'秋季再提升':'年末恢复';let date=addDays('2026-04-20',(w-1)*7+idx),type,warm='-',main='-',cool='-',duration='-',note='';if(wd==='周一'||wd==='周五'){type='休息';note='固定休息，恢复优先'}else if(wd==='周三'){type='健身';warm='动态热身 8-10m';main='维持型力量：深蹲/分腿蹲/臀桥/核心，2-3组，不力竭';cool='拉伸放松';duration='约 40-50m';note='不影响周四骑行质量'}else if(wd==='周二'){type='阈值/甜点';warm='15m ramp 45-80%\n3x\n• 30s 100%\n• 1m 60%';main=cut?'3x\n• 8m 90-92%\n• 5m 50%':'4x\n• 10m 92-96%\n• 5m 50%';cool='10m ramp 50-30%';duration='约 60-80m';note='周二关键课，优先完成质量'}else if(wd==='周四'){type='稳态甜点';warm='12m ramp 45-75%';main=cut?'60m 65-72%':'2-3x\n• 25m 88-90%\n• 6m 40-50%';cool='8-10m easy';duration='约 75-110m';note='稳定心率，不追瞬时功率'}else if(wd==='周六'){type='VO2 / 混合';warm='12-15m ramp 45-85%';main=cut?'45-60m Z2 60-70%':'5x\n• 3m 108-112%\n• 3m 55-60%';cool='10m easy';duration='约 60-75m';note='状态差可降为Z2'}else{type='长有氧';warm='10-15m 45-70%';main=cut?'75-90m 65-72%':'120-180m 70-73%';cool='10m 60-30%';duration='约 95-200m';note='长Z2，关注补给和心率解耦'}return {id:'g'+w+'-'+idx,date,week:w,weekday:wd,phase,type,warm,main,cool,duration,note,ftp:''}}
for(let w=14;w<=37;w++)DOW.forEach((wd,idx)=>plan.push(gen(w,idx,wd)));
function saveSettings(){settings={ftp:+ftp.value||180,kg:+kg.value||62};localStorage.ct_settings=JSON.stringify(settings);renderList();alert('已保存')}
for(let i=1;i<=37;i++)weekSel.innerHTML+=`<option value="${i}">第${i}周</option>`;[...new Set(plan.map(x=>x.type))].forEach(t=>typeSel.innerHTML+=`<option>${t}</option>`);
function pctToWatts(text){let f=+settings.ftp||180;return String(text).replace(/(\d+)(?:-(\d+))?%/g,(m,a,b)=>b?`${m}（${Math.round(f*a/100)}-${Math.round(f*b/100)}W）`:`${m}（${Math.round(f*a/100)}W）`)}
function renderList(){let w=weekSel.value,t=typeSel.value,q=search.value.trim();list.innerHTML='';plan.filter(s=>(w==='all'||s.week==w)&&(t==='all'||s.type===t)&&(!q||JSON.stringify(s).includes(q))).forEach(s=>{let l=logs[s.id],div=document.createElement('div');div.className='item'+(selected&&selected.id===s.id?' active':'');div.onclick=()=>select(s.id);div.innerHTML=`<div class="date">${s.date} ${s.weekday}</div><div><span class="pill">第${s.week}周</span><span class="pill">${s.type}</span>${l?'<span class="pill done">已记录</span>':''}</div><div class="line">${s.main==='-'?s.note:s.main.split('\n')[0]}</div><div class="small">${s.phase}｜${s.duration}</div>`;list.appendChild(div)});renderRecords()}
function block(title,text){return `<div class="step"><b>${title}</b><div class="text">${pctToWatts(text||'-')}</div></div>`}
function select(id){selected=plan.find(x=>x.id===id);let l=logs[id]||{};detail.innerHTML=`<div class="date">${selected.date} ${selected.weekday}</div><div><span class="pill">第${selected.week}周</span><span class="pill">${selected.phase}</span><span class="pill">${selected.type}</span>${selected.ftp?`<span class="pill">建议FTP ${selected.ftp}W</span>`:''}</div><div class="detail-section">${block('热身',selected.warm)}${block('主课',selected.main)}${block('放松',selected.cool)}${block('备注',selected.note)}<div class="small">预计时长：${selected.duration}</div></div><form onsubmit="saveLog(event)"><div class="quick"><button type="button" class="ghost" onclick="setComp(60)">60%</button><button type="button" class="ghost" onclick="setComp(80)">80%</button><button type="button" class="ghost" onclick="setComp(100)">100%</button><button type="button" class="ghost" onclick="setComp(110)">超额</button></div><div class="loggrid"><input name="ap" placeholder="AP 平均功率" inputmode="numeric" value="${l.ap||''}"><input name="np" placeholder="NP 标准化功率" inputmode="numeric" value="${l.np||''}"><input name="hr" placeholder="平均心率" inputmode="numeric" value="${l.hr||''}"><input name="maxhr" placeholder="最高心率" inputmode="numeric" value="${l.maxhr||''}"><input name="min" placeholder="时长 分钟" inputmode="decimal" value="${l.min||''}"><input name="dist" placeholder="距离 km" inputmode="decimal" value="${l.dist||''}"><input name="rpe" placeholder="RPE 1-10" inputmode="decimal" value="${l.rpe||''}"><input name="comp" placeholder="完成度 %" inputmode="numeric" value="${l.comp||''}"></div><textarea name="note" rows="3" placeholder="腿感、心率、睡眠、补给、天气">${l.note||''}</textarea><div id="ana" class="analysis">填写 NP/AP/时长后自动分析。</div><button>保存记录卡片</button></form>`;detail.querySelector('form').oninput=calc;calc();renderList()}
function setComp(v){detail.querySelector('[name=comp]').value=v;calc()}
function calc(){let f=detail.querySelector('form');if(!f)return;let np=+f.np.value,ap=+f.ap.value,min=+f.min.value,rpe=+f.rpe.value,comp=+f.comp.value,ftpv=+settings.ftp||180;let txt=[];if(np)txt.push('IF '+(np/ftpv).toFixed(2));if(np&&min)txt.push('TSS≈'+Math.round(min*Math.pow(np/ftpv,2)*100/60));if(ap&&min)txt.push('kJ≈'+Math.round(ap*min*60/1000));if(np&&ap)txt.push('VI '+(np/ap).toFixed(2));let adv='';if(comp>=90&&rpe&&rpe<=7)adv='完成质量好，可继续按计划。';else if(comp&&comp<75||rpe>=8)adv='压力偏高，下一课建议降级或缩短。';else adv='记录后结合体感判断下一课。';ana.textContent=(txt.length?txt.join('｜')+'。':'')+adv}
function saveLog(e){e.preventDefault();let f=e.target;logs[selected.id]={date:selected.date,week:selected.week,weekday:selected.weekday,type:selected.type,ap:f.ap.value,np:f.np.value,hr:f.hr.value,maxhr:f.maxhr.value,min:f.min.value,dist:f.dist.value,rpe:f.rpe.value,comp:f.comp.value,note:f.note.value,ts:new Date().toISOString()};localStorage.ct_logs=JSON.stringify(logs);renderList();select(selected.id)}
function renderRecords(){let arr=Object.entries(logs).reverse();records.innerHTML=arr.length?'':'暂无训练记录';arr.forEach(([id,l])=>{let div=document.createElement('div');div.className='record';div.innerHTML=`<b>${l.date} ${l.weekday}｜第${l.week}周｜${l.type}</b><div>AP ${l.ap||'-'}W / NP ${l.np||'-'}W / HR ${l.hr||'-'} / RPE ${l.rpe||'-'} / 完成度 ${l.comp||'-'}%</div><div class="small">${l.note||''}</div>`;records.appendChild(div)})}
function exportJSON(){download('cycling-training-backup.json',JSON.stringify({settings,logs},null,2),'application/json')}
function exportCSV(){let rows=['date,weekday,week,type,ap,np,hr,maxhr,min,dist,rpe,completion,note'].concat(Object.values(logs).map(l=>[l.date,l.weekday,l.week,l.type,l.ap,l.np,l.hr,l.maxhr,l.min,l.dist,l.rpe,l.comp,'"'+String(l.note||'').replaceAll('"','""')+'"'].join(',')));download('cycling-training-records.csv',rows.join('\n'),'text/csv')}
function download(n,t,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type}));a.download=n;a.click()}
function importJSON(e){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);if(data.settings)settings=data.settings;if(data.logs)logs=data.logs;localStorage.ct_settings=JSON.stringify(settings);localStorage.ct_logs=JSON.stringify(logs);location.reload()}catch(err){alert('导入失败')}};r.readAsText(file)}
function clearLogs(){if(confirm('确认清空本机记录？')){logs={};localStorage.ct_logs='{}';renderList()}}
weekSel.value='8';renderList();select(plan.find(x=>x.date==='2026-06-08').id);
