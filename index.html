<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AI英语生词学习助手</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=4">
  <link rel="icon" type="image/png" href="apple-touch-icon.png?v=4">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="英语学习">
  <meta name="theme-color" content="#3977ff">
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <main class="app">
    <div class="hero">
      <div class="top">
        <div>
          <div class="title">AI 英语生词助手</div>
          <div class="sub">DeepSeek / Gemini · 多用户云同步 · Supabase</div>
          <div class="sync" id="syncState">准备云同步...</div>
        </div>
        <div class="pill" id="due">今日 0</div>
      </div>
      <div class="userbox">
        <div class="avatar" id="avatar">我</div>
        <select id="userSelect" onchange="switchUser(this.value)"></select>
        <button class="ghost" onclick="addUser()" style="flex:0 0 auto;background:#fff">＋</button>
      </div>
    </div>
    <section id="home" class="page"></section>
    <section id="book" class="page hidden"></section>
    <section id="test" class="page hidden"></section>
    <section id="speak" class="page hidden"></section>
    <section id="history" class="page hidden"></section>
    <section id="review" class="page hidden"></section>
  </main>
  <nav class="tabs" id="tabs"></nav>
  <script src="app.js?v=1"></script>
</body>
</html>
