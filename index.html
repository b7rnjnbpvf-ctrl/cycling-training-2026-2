<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AI英语生词学习助手</title><style>:root{--bg:#f4f8ff;--card:#fff;--text:#101827;--muted:#6b7890;--p:#2f80ed;--p2:#7c3aed;--soft:#eaf3ff;--line:#e3ebf6;--green:#16a34a;--orange:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 20% 0%,#dcebff 0,#f7fbff 38%,#f5f7fb 100%);color:var(--text)}button,input,textarea,select{font:inherit}button{border:0;border-radius:16px;padding:13px 14px;background:linear-gradient(135deg,var(--p),var(--p2));color:white;font-weight:850;box-shadow:0 10px 22px rgba(47,128,237,.16)}button.ghost{background:#eaf3ff;color:#2468d8;box-shadow:none}button.light{background:#f1f5f9;color:#334155;box-shadow:none}button.small{padding:8px 10px;border-radius:12px;font-size:12px}.app{max-width:480px;margin:auto;min-height:100vh;padding:18px 14px 92px}.hero{background:linear-gradient(145deg,rgba(255,255,255,.88),rgba(236,246,255,.9));border:1px solid rgba(255,255,255,.9);box-shadow:0 20px 50px rgba(44,105,201,.12);border-radius:28px;padding:16px;margin-bottom:14px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.title{font-size:24px;font-weight:950;letter-spacing:-.5px}.sub,.muted{color:var(--muted);font-size:13px;line-height:1.5}.userbar{display:flex;gap:8px;margin-top:14px;align-items:center}.select,.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;background:rgba(255,255,255,.92);outline:none}.select{font-weight:800;color:#1e293b}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);box-shadow:0 12px 34px rgba(25,60,120,.08);border-radius:24px;padding:16px;margin:12px 0}.section{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.section h2{font-size:20px;margin:0}.textarea{min-height:104px;resize:vertical}.actions{display:flex;gap:10px;margin-top:10px}.actions>*{flex:1}.result{margin-top:12px;padding:13px;border-radius:18px;background:#f8fbff;line-height:1.65;border:1px solid #edf3fb}.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.96);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:9}.tab{background:transparent;color:#64748b;padding:8px 2px;font-size:11px;box-shadow:none}.tab.active{background:var(--soft);color:var(--p)}.hidden{display:none}.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{text-align:center;background:white;border:1px solid var(--line);border-radius:20px;padding:13px}.num{font-size:22px;font-weight:950}.word{display:flex;justify-content:space-between;gap:10px}.word h3{margin:0;font-size:20px}.tag{display:inline-block;border-radius:999px;background:#edf5ff;color:#2563eb;padding:5px 10px;font-size:12px;font-weight:850}.examples{padding-left:18px;margin-bottom:0}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;color:#475569;border-radius:999px;padding:8px 12px;font-weight:750}.chip.active{background:var(--p);color:white}.filters{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.test-option{width:100%;text-align:left;background:#f8fafc;color:#334155;border:1px solid var(--line);margin:7px 0;box-shadow:none}.ok{background:#dcfce7!important;color:#166534!important}.bad{background:#ffe4e6!important;color:#be123c!important}.empty{text-align:center;color:var(--muted);padding:28px 8px}.notice{font-size:12px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:10px;border-radius:14px;margin-top:10px}</style></head><body><main class="app"><div class="hero"><div class="top"><div><div class="title">AI 英语学习</div><div class="sub">Gemini 免费版 · 生词分用户独立保存</div></div><button class="small ghost" onclick="openUserManager()">用户</button></div><div class="userbar"><select id="userSelect" class="select" onchange="switchUser(this.value)"></select><button class="small" onclick="openUserManager()">切换/新增</button></div></div><section id="home" class="page"></section><section id="book" class="page hidden"></section><section id="test" class="page hidden"></section><section id="speak" class="page hidden"></section><section id="history" class="page hidden"></section><section id="review" class="page hidden"></section></main><nav class="tabs" id="tabs"></nav><script>const FN='https://uhhciyagfbaekeodwqcq.supabase.co/functions/v1/ai-english';const DB='https://uhhciyagfbaekeodwqcq.supabase.co/rest/v1';const KEY='sb_publishable_bv-gGuq-ihUFlnsPfYLF4w_9BKlpW-U';const cats=['全部','商务','日常','校园','旅行','科技','考试','口语','其他'];const defaultUsers=[{id:'11111111-1111-4111-8111-111111111111',name:'我'},{id:'22222222-2222-4222-8222-222222222222',name:'家人'}];let users=JSON.parse(localStorage.getItem('englishUsers')||'null')||defaultUsers;let activeUserId=localStorage.getItem('activeEnglishUser')||users[0].id;function emptyState(){return{tab:'home',filter:'全部',hfilter:'全部',items:[],tests:[]}}function stateKey(){return'englishAppV3_'+activeUserId}let S=JSON.parse(localStorage.getItem(stateKey())||'null')||emptyState();function save(){localStorage.setItem(stateKey(),JSON.stringify(S));localStorage.setItem('activeEnglishUser',activeUserId);localStorage.setItem('englishUsers',JSON.stringify(users))}function activeUser(){return users.find(u=>u.id===activeUserId)||users[0]}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sp(t){if(speechSynthesis){let u=new SpeechSynthesisUtterance(t);u.lang='en-US';speechSynthesis.speak(u)}}function current(){return S.items.filter(i=>i.isInCurrentBook)}function mastered(){return S.items.filter(i=>i.status==='已掌握')}function dueItems(){let n=Date.now();return current().filter(i=>new Date(i.nextReviewAt).getTime()<=n)}async function ai(text,mode){let r=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,mode,user:activeUser().name})});let j=await r.json();if(j.error)throw Error(j.error);return j.data}async function dbInsert(table,row){try{await fetch(DB+'/'+table,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({...row,user_id:activeUserId})})}catch(e){console.warn(e)}}function norm(d,raw){return{id:String(Date.now()+Math.random()),userId:activeUserId,text:d.text||raw,type:d.type||'word',phonetic:d.phonetic||'',partOfSpeech:d.partOfSpeech||'',definitionCn:d.definitionCn||d.translation||'',definitionEn:d.definitionEn||'',category:d.category||'其他',examples:(d.examples||[]).map(x=>Array.isArray(x)?x:[x.en,x.cn]),status:'学习中',masteryLevel:1,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),lastReviewedAt:null,nextReviewAt:new Date().toISOString(),isInCurrentBook:true}}function renderUserSelect(){userSelect.innerHTML=users.map(u=>`<option value="${u.id}" ${u.id===activeUserId?'selected':''}>${esc(u.name)}的词库</option>`).join('')}function switchUser(id){save();activeUserId=id;S=JSON.parse(localStorage.getItem(stateKey())||'null')||emptyState();save();render()}function openUserManager(){let names=users.map((u,i)=>`${i+1}. ${u.name}${u.id===activeUserId?'（当前）':''}`).join('\n');let name=prompt('当前用户：\n'+names+'\n\n输入新用户名称即可新增；输入已有序号可切换。');if(!name)return;let n=name.trim();let idx=parseInt(n,10)-1;if(!isNaN(idx)&&users[idx]){switchUser(users[idx].id);return}let id=crypto.randomUUID?crypto.randomUUID():String(Date.now());users.push({id,name:n});activeUserId=id;S=emptyState();save();render()}function card(i,extra=''){return`<div class="card"><div class="word"><div><h3>${esc(i.text)}</h3><div class="muted">${esc(i.phonetic)} · ${esc(i.partOfSpeech)}</div></div><button class="ghost small" onclick="sp('${esc(i.text)}')">🔊</button></div><p>${esc(i.definitionCn)}</p><p class="muted">${esc(i.definitionEn)}</p><span class="tag">${esc(i.category)}</span><span class="muted"> 阶段${i.masteryLevel} · 下次 ${new Date(i.nextReviewAt).toLocaleDateString()}</span><ol class="examples">${(i.examples||[]).map(e=>`<li>${esc(e[0])}<br><span class="muted">${esc(e[1])}</span></li>`).join('')}</ol>${extra}</div>`}function tabs(){tabsEl.innerHTML=[['home','首页'],['book','生词本'],['test','测试'],['speak','口语'],['history','历史'],['review','复习']].map(([id,n])=>`<button class="tab ${S.tab===id?'active':''}" onclick="S.tab='${id}';save();render()">${n}</button>`).join('')}function renderHome(){home.innerHTML=`<div class="statgrid"><div class="stat"><div class="num">${current().length}</div><div class="muted">当前生词</div></div><div class="stat"><div class="num">${dueItems().length}</div><div class="muted">今日复习</div></div><div class="stat"><div class="num">${mastered().length}</div><div class="muted">已掌握</div></div></div><div class="card"><div class="section"><h2>翻译</h2><span class="tag">${esc(activeUser().name)}</span></div><textarea id="ti" class="input textarea" placeholder="输入中文或英文，支持中译英、英译中、单词翻译"></textarea><div class="actions"><button onclick="doTrans()">AI 翻译</button><button class="ghost" onclick="tr.classList.add('hidden')">清空</button></div><div id="tr" class="result hidden"></div></div><div class="card"><div class="section"><h2>添加生词</h2><span class="muted">独立保存</span></div><textarea id="nw" class="input textarea" placeholder="例如 efficient / book a hotel / 我想提高英语口语"></textarea><div class="actions"><button onclick="addWord()">AI分析并加入${esc(activeUser().name)}的词库</button></div><div class="notice">切换用户后，生词本、历史词库、测试记录会分别保存，互不混用。</div></div>`}async function doTrans(){let v=ti.value.trim();if(!v)return;tr.classList.remove('hidden');tr.innerHTML='正在调用 Gemini 翻译...';try{let d=await ai(v,'translate');tr.innerHTML=`<b>${esc(v)}</b><br>翻译：${esc(d.translation)}<br>音标：${esc(d.phonetic)}<br>词性：${esc(d.partOfSpeech)}<br>中文释义：${esc(d.definitionCn)}<br>英文解释：${esc(d.definitionEn)}<br>分类：${esc(d.category)}<br><button class="ghost small" onclick="sp('${esc(v)}')">播放发音</button>`}catch(e){tr.innerHTML='调用失败：'+esc(e.message)}}async function addWord(){let v=nw.value.trim();if(!v)return;nw.value='';try{let old=document.querySelector('.notice');if(old)old.textContent='正在 AI 分析...';let d=await ai(v,'vocabulary');let it=norm(d,v);S.items.unshift(it);save();render();dbInsert('vocabulary_items',{text:it.text,type:it.type,phonetic:it.phonetic,part_of_speech:it.partOfSpeech,definition_cn:it.definitionCn,definition_en:it.definitionEn,category:it.category,examples_json:it.examples,status:it.status,mastery_level:it.masteryLevel,next_review_at:it.nextReviewAt,is_in_current_book:true})}catch(e){alert('AI分析失败：'+e.message)}}function renderBook(){let list=current();if(S.filter!=='全部')list=list.filter(i=>i.category===S.filter);book.innerHTML=`<div class="card"><div class="section"><h2>${esc(activeUser().name)}的当前生词</h2><span class="tag">${list.length}个</span></div><div class="filters">${cats.map(c=>`<button class="chip ${S.filter===c?'active':''}" onclick="S.filter='${c}';save();render()">${c}</button>`).join('')}</div></div>${list.map(i=>card(i,`<div class="actions"><button class="light" onclick="removeItem('${i.id}')">移出当前生词本</button></div>`)).join('')||'<div class="card empty">当前没有生词</div>'}`}function removeItem(id){let i=S.items.find(x=>x.id===id);i.isInCurrentBook=false;i.status='已移出';save();render()}function renderTest(){let i=(dueItems()[0]||current()[0]);if(!i){test.innerHTML='<div class="card empty">暂无可测试生词</div>';return}let ops=[i.definitionCn,'完全无关的意思','预约；计划','快速移动'].sort(()=>Math.random()-.5);test.innerHTML=`<div class="card"><h2>${esc(activeUser().name)}的练习测试</h2><div class="muted">当前演示：答对即掌握。</div><h3>${esc(i.text)}</h3><p>请选择正确中文释义：</p>${ops.map(o=>`<button class="test-option" onclick="ans('${i.id}',this,'${esc(o)}')">${esc(o)}</button>`).join('')}<div id="fb" class="result hidden"></div></div>`}function ans(id,b,a){let i=S.items.find(x=>x.id===id),ok=a===i.definitionCn;b.classList.add(ok?'ok':'bad');S.tests.unshift({id:String(Date.now()),userId:activeUserId,vocabularyItemId:id,testType:'英文选中文',question:i.text,userAnswer:a,correctAnswer:i.definitionCn,isCorrect:ok,score:ok?100:0,createdAt:new Date().toISOString()});if(ok){i.status='已掌握';i.isInCurrentBook=false;i.masteryLevel=6;i.lastReviewedAt=new Date().toISOString();i.nextReviewAt=new Date(Date.now()+30*864e5).toISOString();fb.innerHTML='回答正确：已从当前生词本移除，历史词库保留。'}else{i.status='需复习';i.nextReviewAt=new Date(Date.now()+864e5).toISOString();fb.innerHTML='未通过：继续保留，下一阶段复习。'}fb.classList.remove('hidden');save();dbInsert('test_records',{test_type:'英文选中文',question:i.text,user_answer:a,correct_answer:i.definitionCn,is_correct:ok,score:ok?100:0});setTimeout(render,900)}function renderSpeak(){let i=current()[0];speak.innerHTML=i?`<div class="card"><h2>${esc(activeUser().name)}的口语练习</h2><span class="tag">${esc(i.category)}</span><h3>目标词：${esc(i.text)}</h3><p>请用目标词回答：How would you use "${esc(i.text)}" in a real conversation?</p><div class="actions"><button onclick="sr.classList.remove('hidden');sr.innerHTML='识别结果：I want to use ${esc(i.text)} in daily English.<br><br>AI反馈：表达基本正确，建议放入更真实语境。'">🎙 模拟录音</button><button class="ghost" onclick="sp('${esc(i.text)}')">播放</button></div><div id="sr" class="result hidden"></div></div>`:'<div class="card empty">暂无口语练习词</div>'}function renderHistory(){let list=S.items;if(S.hfilter!=='全部')list=list.filter(i=>i.status===S.hfilter);history.innerHTML=`<div class="card"><div class="section"><h2>${esc(activeUser().name)}的历史词库</h2><span class="tag">${list.length}个</span></div><div class="filters">${['全部','学习中','需复习','已掌握','已移出'].map(s=>`<button class="chip ${S.hfilter===s?'active':''}" onclick="S.hfilter='${s}';save();render()">${s}</button>`).join('')}</div></div>${list.map(i=>card(i,`<div class="muted">状态：${esc(i.status)} · ${i.isInCurrentBook?'当前生词本中':'不在当前生词本'}</div>`)).join('')||'<div class="card empty">历史词库为空</div>'}`}function renderReview(){let d=dueItems(),soon=current().filter(i=>!d.includes(i));review.innerHTML=`<div class="card"><h2>${esc(activeUser().name)}的复习计划</h2><p class="muted">间隔重复：当天 → 1天 → 3天 → 7天 → 15天 → 30天。</p></div><div class="card"><h3>今日需复习</h3>${d.map(i=>`<p><b>${esc(i.text)}</b> <span class="tag">阶段${i.masteryLevel}</span></p>`).join('')||'<p class="muted">今天没有到期词。</p>'}</div><div class="card"><h3>即将复习</h3>${soon.map(i=>`<p><b>${esc(i.text)}</b><br><span class="muted">${new Date(i.nextReviewAt).toLocaleString()}</span></p>`).join('')||'<p class="muted">暂无即将复习词。</p>'}</div>`}function render(){renderUserSelect();document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(S.tab).classList.remove('hidden');window.tabsEl=document.getElementById('tabs');tabs();({home:renderHome,book:renderBook,test:renderTest,speak:renderSpeak,history:renderHistory,review:renderReview}[S.tab])()}render();</script></body></html>
