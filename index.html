function participantNames(id){return participants[id]||[]}function saveParticipants(){localStorage.setItem(participantKey,JSON.stringify(participants))}
function queryWechatName(){const q=new URLSearchParams(location.search);return q.get('wxname')||q.get('wechat')||q.get('nickname')||''}
function getWechatName(){const cached=localStorage.getItem(wechatNameKey)||queryWechatName();const hint=/MicroMessenger/i.test(navigator.userAgent)?'当前在微信中，但静态网页不能静默读取微信昵称；如需自动抓取，需要接入公众号 OAuth。请确认你的微信名：':'请输入你的微信名/昵称，用于显示在“已参加人员”：';const name=(cached||prompt(hint,'')||'').trim();if(name)localStorage.setItem(wechatNameKey,name);return name}
function renderPeople(id){const names=participantNames(id);return names.length?names.map(n=>`<span class="person">${esc(n)}</span>`).join(''):'<span class="small">暂无人员，点击参加后显示微信名。</span>'}
function renderRides(){rides.innerHTML=RIDES.map(ride=>{const w=ride.weather,count=counts[ride.id],didJoin=!!joined[ride.id],daily=weatherByDate[ride.date],currentRoute=routeText(ride);return `<article class="card ride-card" id="ride-${ride.id}"><div class="ride-content"><div><div class="ride-head"><div><div class="weekday">${ride.date} · ${ride.weekday}</div><div class="ride-date-edit"><input id="ride-date-${ride.id}" type="date" value="${ride.date}" aria-label="修改${esc(ride.title)}日期"><button onclick="updateRideDate('${ride.id}')">改日期</button></div><div class="ride-title">${esc(ride.title)}</div></div><div class="badge amber">${esc(ride.location)}</div></div><div class="badges"><span class="badge blue">出发 ${ride.start}</span><span class="badge">${ride.distance}</span><span class="badge">均速 ${ride.avg}</span><span class="badge">${ride.laps}</span></div><div class="weather-at-ride"><div class="bigicon">${w?w.icon:(daily?daily.icon:'⌛')}</div><div><b>${ride.start} 天气：</b>${w?`${esc(w.text)}，约 ${Math.round(w.temp)}°C，风 ${Math.round(w.wind)} km/h，降雨 ${w.precip??0} mm / ${w.prob??'-'}%`:(daily?`${esc(daily.text)}，全天 ${Math.round(daily.tmin)}°-${Math.round(daily.tmax)}°C，风 ${Math.round(daily.wind)} km/h，降雨 ${daily.rain} mm`:'等待天气更新')}<div class="small">天气预报仅供展示，临出发前请再次确认。</div></div></div><div class="route-box"><b>路线描述</b><div class="route-text" id="route-text-${ride.id}">${esc(currentRoute)}</div></div><div class="route-tools"><button class="secondary" onclick="toggleRouteEditor('${ride.id}')">更改路线</button><button class="secondary" onclick="syncRouteFromDescription('${ride.id}')">抓取地图点</button></div><div class="route-editor" id="route-editor-${ride.id}"><textarea id="route-input-${ride.id}">${esc(currentRoute)}</textarea><div class="route-editor-actions"><button class="primary" onclick="saveRoute('${ride.id}')">保存</button><button class="secondary" onclick="syncRouteFromEditor('${ride.id}')">刷新地图</button><button class="secondary" onclick="resetRoute('${ride.id}')">默认</button></div></div></div><div><div class="map-panel"><div class="map-tabs"><button class="active" onclick="showMapTab('${ride.id}','real')">实际地图</button><button onclick="showMapTab('${ride.id}','sketch')">示意</button></div><div class="map-view active" id="real-${ride.id}"><div class="leaflet-map" id="map-${ride.id}"></div><div class="map-links"><a href="${routeMapUrl(ride)}" target="_blank" rel="noopener">打开路线</a><span class="small">${esc(placeNames(ride).join(' → '))}</span></div></div><div class="map-view sketch" id="sketch-${ride.id}">${routeSvg(ride.type)}<div class="route-note">示意图非精确导航地图。</div></div></div><div class="participants"><div class="join-row"><div><div class="small">线上参加人数</div><div class="count" id="count-${ride.id}">${count==='error'?'线上不可用':(count==null?'同步中':count+' 人')}</div></div><button class="join" ${didJoin?'disabled':''} onclick="joinRide('${ride.id}')">${didJoin?'已参加':'我要参加'}</button></div><div class="people"><b>已参加人员</b><div class="people-list" id="people-${ride.id}">${renderPeople(ride.id)}</div></div></div></div></div></article>`}).join('');setTimeout(renderMaps,0)}
function showMapTab(id,tab){document.querySelectorAll(`#ride-${id} .map-view`).forEach(v=>v.classList.remove('active'));document.querySelectorAll(`#ride-${id} .map-tabs button`).forEach(b=>b.classList.remove('active'));document.getElementById(`${tab}-${id}`)?.classList.add('active');window.event?.target?.classList.add('active');if(tab==='real')setTimeout(()=>maps[id]?.invalidateSize(),50)}
function renderMaps(){if(!window.L)return;RIDES.forEach(ride=>{const el=document.getElementById(`map-${ride.id}`);if(!el)return;const pts=routePoints(ride);if(maps[ride.id]){maps[ride.id].remove();delete maps[ride.id]}const center=pts[0]?.coord||[ride.lat,ride.lon];const map=L.map(el,{scrollWheelZoom:false,attributionControl:false}).setView(center,12);maps[ride.id]=map;L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);if(pts.length){const latlngs=pts.map(p=>p.coord);L.polyline(latlngs,{color:'#0f766e',weight:5,opacity:.9}).addTo(map);pts.forEach((p,i)=>L.marker(p.coord).addTo(map).bindPopup(`${i+1}. ${p.name}`));map.fitBounds(latlngs,{padding:[18,18]})}})}
function toggleRouteEditor(id){document.getElementById(`route-editor-${id}`)?.classList.toggle('open')}function rideById(id){return RIDES.find(r=>r.id===id)}
function saveRoute(id){const input=document.getElementById(`route-input-${id}`);const value=input.value.trim();if(!value)return alert('路线不能为空');routeOverrides[id]=value;localStorage.setItem(routeKey,JSON.stringify(routeOverrides));routePlaces[id]=parseRoutePlaces(value,rideById(id));localStorage.setItem(routePlacesKey,JSON.stringify(routePlaces));renderRides()}
function syncRouteFromDescription(id){routePlaces[id]=parseRoutePlaces(routeText(rideById(id)),rideById(id));localStorage.setItem(routePlacesKey,JSON.stringify(routePlaces));renderRides()}function syncRouteFromEditor(id){const input=document.getElementById(`route-input-${id}`);routePlaces[id]=parseRoutePlaces(input.value,rideById(id));localStorage.setItem(routePlacesKey,JSON.stringify(routePlaces));alert('已刷新实际地图点位');renderRides()}function resetRoute(id){delete routeOverrides[id];delete routePlaces[id];localStorage.setItem(routeKey,JSON.stringify(routeOverrides));localStorage.setItem(routePlacesKey,JSON.stringify(routePlaces));renderRides()}
async function joinRide(id){if(joined[id])return;const wxName=getWechatName();if(!wxName)return alert('需要微信名才能显示在已参加人员中。');if(!confirm(`确认以“${wxName}”参加？点击后不可更改，并会计入线上统计。`))return;joined[id]=true;localStorage.setItem(joinedKey,JSON.stringify(joined));participants[id]=Array.from(new Set([...(participants[id]||[]),wxName]));saveParticipants();renderRides();try{const res=await fetch(counterUrl(id,'up'));if(!res.ok)throw new Error('线上统计提交失败');counts[id]=countValue(await res.json());renderRides()}catch(err){const el=document.getElementById(`count-${id}`);if(el)el.textContent='已点击，线上人数同步失败';alert(err.message+'，名单已在本机显示；请稍后刷新查看人数。')}}
rebuildWeek();renderWeather();renderRides();fetchWeather();refreshCounts().catch(()=>renderRides());setInterval(fetchWeather,60*60*1000);setInterval(()=>refreshCounts().catch(()=>{}),60*1000);
</script>
</body>
