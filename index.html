<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AI英语生词学习助手</title><link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2"><link rel="icon" type="image/png" href="apple-touch-icon.png?v=2"><link rel="icon" type="image/svg+xml" href="favicon.svg?v=2"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="英语学习"><meta name="theme-color" content="#3977ff"><style>:root{--bg:#f4f8ff;--card:#fff;--ink:#12213a;--muted:#72809a;--p:#3977ff;--p2:#6c5ce7;--soft:#edf4ff;--line:#e5edf7;--good:#16a34a;--bad:#e11d48}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 10% 0,#dff0ff,transparent 35%),linear-gradient(180deg,#f7fbff,#f5f8ff);color:var(--ink)}button,textarea,input,select{font:inherit}button{border:0;border-radius:16px;padding:12px 14px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:800;box-shadow:0 8px 18px rgba(57,119,255,.16)}button.ghost{background:var(--soft);color:var(--p);box-shadow:none}button.light{background:#f1f5f9;color:#334155;box-shadow:none}.app{max-width:480px;margin:auto;min-height:100vh;padding:16px 14px 92px}.hero{background:linear-gradient(135deg,#377dff,#6c5ce7);color:white;border-radius:28px;padding:18px;margin-bottom:12px;box-shadow:0 16px 35px rgba(57,119,255,.22)}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title{font-size:24px;font-weight:950;letter-spacing:-.4px}.sub{font-size:13px;opacity:.86;margin-top:4px}.userbox{margin-top:14px;display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.26);border-radius:18px;padding:8px}.avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#fff;color:var(--p);font-weight:900}.userbox select{flex:1;border:0;background:#fff;color:#23314d;border-radius:13px;padding:9px;font-weight:800}.pill,.tag{border-radius:999px;background:#fff;border:1px solid var(--line);padding:7px 10px;font-size:12px;color:var(--muted)}.tag{background:#eef6ff;color:#2563eb;font-weight:800}.card{background:rgba(255,255,255,.95);border:1px solid var(--line);box-shadow:0 10px 30px rgba(44,88,160,.07);border-radius:24px;padding:16px;margin:12px 0}.card h2{margin:0 0 12px;font-size:18px}.input{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;background:#fbfdff;outline:none}.textarea{min-height:104px}.actions{display:flex;gap:10px;margin-top:10px}.actions>*{flex:1}.result{margin-top:12px;padding:12px;border-radius:18px;background:#f8fbff;line-height:1.6;border:1px solid var(--line)}.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:9}.tab{background:transparent;color:#64748b;padding:7px 2px;font-size:11px;box-shadow:none}.tab.active{background:var(--soft);color:var(--p)}.hidden{display:none}.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{text-align:center;background:white;border:1px solid var(--line);border-radius:20px;padding:12px}.num{font-size:22px;font-weight:950}.muted{color:var(--muted);font-size:13px}.word{display:flex;justify-content:space-between;gap:8px}.word h3{margin:0;font-size:20px}.examples{padding-left:18px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;color:#475569;border-radius:999px;padding:8px 11px;box-shadow:none}.chip.active{background:var(--p);color:white}.filters{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.test-option{width:100%;text-align:left;background:#f8fafc;color:#334155;border:1px solid var(--line);margin:7px 0;box-shadow:none}.ok{background:#dcfce7!important;color:#166534!important}.bad{background:#ffe4e6!important;color:#be123c!important}.empty{text-align:center;color:var(--muted);padding:28px 8px}</style></head><body><main class="app"><div class="hero"><div class="top"><div><div class="title">AI 英语生词助手</div><div class="sub">DeepSeek / Gemini · 多用户独立词库 · Supabase 同步</div></div><div class="pill" id="due">今日 0</div></div><div class="userbox"><div class="avatar" id="avatar">我</div><select id="userSelect" onchange="switchUser(this.value)"></select><button class="ghost" onclick="addUser()" style="flex:0 0 auto;background:#fff">＋</button></div></div><section id="home" class="page"></section><section id="book" class="page hidden"></section><section id="test" class="page hidden"></section><section id="speak" class="page hidden"></section><section id="history" class="page hidden"></section><section id="review" class="page hidden"></section></main><nav class="tabs" id="tabs"></nav><script>const FN='https://uhhciyagfbaekeodwqcq.supabase.co/functions/v1/ai-english';const DB='https://uhhciyagfbaekeodwqcq.supabase.co/rest/v1';const KEY='sb_publishable_bv-gGuq-ihUFlnsPfYLF4w_9BKlpW-U';const cats=['全部','商务','日常','校园','旅行','科技','考试','口语','其他'];const defaultUsers=[{id:'11111111-1111-4111-8111-111111111111',name:'我',avatar:'我'},{id:'22222222-2222-4222-8222-222222222222',name:'家人',avatar:'家'}];let users=JSON.parse(localStorage.getItem('englishUsers')||'null')||defaultUsers;let uid=localStorage.getItem('activeEnglishUser')||users[0].id;function emptyState(){return{tab:'home',filter:'全部',hfilter:'全部',items:[],tests:[]}}function key(){return'englishAppV3_'+uid}let S=JSON.parse(localStorage.getItem(key())||'null')||emptyState();function save(){localStorage.setItem(key(),JSON.stringify(S));localStorage.setItem('activeEnglishUser',uid);localStorage.setItem('englishUsers',JSON.stringify(users))}function user(){return users.find(x=>x.id===uid)||users[0]}function switchUser(id){save();uid=id;S=JSON.parse(localStorage.getItem(key())||'null')||emptyState();save();render()}function addUser(){let name=prompt('输入新用户名称，例如：女儿 / 自己 / 用户D');if(!name)return;let id=crypto.randomUUID?crypto.randomUUID():String(Date.now());users.push({id,name,avatar:name.slice(0,1)});uid=id;S=emptyState();save();render()}function renderUsers(){let u=user();avatar.textContent=(u.avatar||u.name.slice(0,1));userSelect.innerHTML=users.map(x=>`<option value="${x.id}" ${x.id===uid?'selected':''}>${x.name}｜独立词库</option>`).join('')}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sp(t){if(speechSynthesis){let u=new SpeechSynthesisUtterance(t);u.lang='en-US';speechSynthesis.speak(u)}}function current(){return S.items.filter(i=>i.isInCurrentBook)}function mastered(){return S.items.filter(i=>i.status==='已掌握')}function dueItems(){let n=Date.now();return current().filter(i=>new Date(i.nextReviewAt).getTime()<=n)}async function ai(text,mode){let r=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,mode,user:user().name})});let j=await r.json();if(j.error)throw Error(j.error);return j.data}async function dbInsert(table,row){try{await fetch(DB+'/'+table,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({...row,user_id:uid})})}catch(e){console.warn(e)}}function norm(d,raw){return{id:String(Date.now()+Math.random()),text:d.text||raw,type:d.type||'word',phonetic:d.phonetic||'',partOfSpeech:d.partOfSpeech||'',definitionCn:d.definitionCn||d.translation||'',definitionEn:d.definitionEn||'',category:d.category||'其他',examples:(d.examples||[]).map(x=>Array.isArray(x)?x:[x.en,x.cn]),status:'学习中',masteryLevel:1,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),lastReviewedAt:null,nextReviewAt:new Date().toISOString(),isInCurrentBook:true,userId:uid}}function card(i,extra=''){return`<div class="card"><div class="word"><div><h3>${esc(i.text)}</h3><div class="muted">${esc(i.phonetic)} · ${esc(i.partOfSpeech)}</div></div><button class="ghost" onclick="sp('${esc(i.text)}')">🔊</button></div><p>${esc(i.definitionCn)}</p><p class="muted">${esc(i.definitionEn)}</p><span class="tag">${esc(i.category)}</span><span class="muted"> 阶段${i.masteryLevel} · ${new Date(i.nextReviewAt).toLocaleDateString()}</span><ol class="examples">${(i.examples||[]).map(e=>`<li>${esc(e[0])}<br><span class="muted">${esc(e[1])}</span></li>`).join('')}</ol>${extra}</div>`}function nav(){tabs.innerHTML=[['home','首页'],['book','生词本'],['test','测试'],['speak','口语'],['history','历史'],['review','复习']].map(([id,n])=>`<button class="tab ${S.tab===id?'active':''}" onclick="S.tab='${id}';save();render()">${n}</button>`).join('')}function renderHome(){home.innerHTML=`<div class="statgrid"><div class="stat"><div class="num">${current().length}</div><div class="muted">当前生词</div></div><div class="stat"><div class="num">${dueItems().length}</div><div class="muted">今日复习</div></div><div class="stat"><div class="num">${mastered().length}</div><div class="muted">已掌握</div></div></div><div class="card"><h2>快速翻译</h2><textarea id="ti" class="input textarea" placeholder="输入中文或英文"></textarea><div class="actions"><button onclick="doTrans()">AI 翻译</button><button class="ghost" onclick="tr.classList.add('hidden')">清空</button></div><div id="tr" class="result hidden"></div></div><div class="card"><h2>添加到 ${esc(user().name)} 的生词本</h2><textarea id="nw" class="input textarea" placeholder="输入单词、短语或句子"></textarea><div class="actions"><button onclick="addWord()">AI分析并保存</button></div><div class="muted" style="margin-top:10px">每个用户独立保存，切换用户后互不影响。</div></div>`}async function doTrans(){let v=ti.value.trim();if(!v)return;tr.classList.remove('hidden');tr.innerHTML='正在翻译...';try{let d=await ai(v,'translate');tr.innerHTML=`<b>${esc(v)}</b><br>翻译：${esc(d.translation)}<br>音标：${esc(d.phonetic)}<br>词性：${esc(d.partOfSpeech)}<br>中文释义：${esc(d.definitionCn)}<br>英文解释：${esc(d.definitionEn)}<br>分类：${esc(d.category)}<br><button class="ghost" onclick="sp('${esc(v)}')">播放发音</button>`}catch(e){tr.innerHTML='调用失败：'+esc(e.message)}}async function addWord(){let v=nw.value.trim();if(!v)return;nw.value='';S.tab='book';render();book.innerHTML='<div class="card empty">AI 正在分析并加入当前用户词库...</div>';try{let d=await ai(v,'vocabulary');let it=norm(d,v);S.items.unshift(it);save();dbInsert('vocabulary_items',{text:it.text,type:it.type,phonetic:it.phonetic,part_of_speech:it.partOfSpeech,definition_cn:it.definitionCn,definition_en:it.definitionEn,category:it.category,examples_json:it.examples,status:it.status,mastery_level:it.masteryLevel,next_review_at:it.nextReviewAt,is_in_current_book:true});render()}catch(e){alert('AI分析失败：'+e.message);render()}}function renderBook(){let list=current();if(S.filter!=='全部')list=list.filter(i=>i.category===S.filter);book.innerHTML=`<div class="card"><h2>${esc(user().name)} 的当前生词本</h2><div class="filters">${cats.map(c=>`<button class="chip ${S.filter===c?'active':''}" onclick="S.filter='${c}';save();render()">${c}</button>`).join('')}</div></div>${list.map(i=>card(i,`<div class="actions"><button class="light" onclick="removeItem('${i.id}')">移出当前生词本</button></div>`)).join('')||'<div class="card empty">当前没有生词</div>'}`}function removeItem(id){let i=S.items.find(x=>x.id===id);i.isInCurrentBook=false;i.status='已移出';save();render()}function renderTest(){let i=(dueItems()[0]||current()[0]);if(!i){test.innerHTML='<div class="card empty">暂无可测试生词</div>';return}let ops=[i.definitionCn,'完全无关的意思','预约；计划','快速移动'].sort(()=>Math.random()-.5);test.innerHTML=`<div class="card"><h2>${esc(user().name)} 的练习测试</h2><h3>${esc(i.text)}</h3><p>请选择正确中文释义：</p>${ops.map(o=>`<button class="test-option" onclick="ans('${i.id}',this,'${esc(o)}')">${esc(o)}</button>`).join('')}<div id="fb" class="result hidden"></div></div>`}function ans(id,b,a){let i=S.items.find(x=>x.id===id),ok=a===i.definitionCn;b.classList.add(ok?'ok':'bad');S.tests.unshift({id:String(Date.now()),vocabularyItemId:id,testType:'英文选中文',question:i.text,userAnswer:a,correctAnswer:i.definitionCn,isCorrect:ok,score:ok?100:0,createdAt:new Date().toISOString(),userId:uid});if(ok){i.status='已掌握';i.isInCurrentBook=false;i.masteryLevel=6;i.lastReviewedAt=new Date().toISOString();i.nextReviewAt=new Date(Date.now()+30*864e5).toISOString();fb.innerHTML='回答正确：已从当前生词本移除，历史词库保留。'}else{i.status='需复习';i.nextReviewAt=new Date(Date.now()+864e5).toISOString();fb.innerHTML='未通过：继续保留，下一阶段复习。'}fb.classList.remove('hidden');save();dbInsert('test_records',{test_type:'英文选中文',question:i.text,user_answer:a,correct_answer:i.definitionCn,is_correct:ok,score:ok?100:0});setTimeout(render,900)}function renderSpeak(){let i=current()[0];speak.innerHTML=i?`<div class="card"><h2>口语练习</h2><span class="tag">${esc(i.category)}</span><h3>目标词：${esc(i.text)}</h3><p>请用目标词回答：How would you use "${esc(i.text)}" in a real conversation?</p><div class="actions"><button onclick="sr.classList.remove('hidden');sr.innerHTML='识别结果：I want to use ${esc(i.text)} in daily English.<br><br>AI反馈：表达基本正确，建议放入更真实语境。'">🎙 模拟录音</button><button class="ghost" onclick="sp('${esc(i.text)}')">播放</button></div><div id="sr" class="result hidden"></div></div>`:'<div class="card empty">暂无口语练习词</div>'}function renderHistory(){let list=S.items;if(S.hfilter!=='全部')list=list.filter(i=>i.status===S.hfilter);history.innerHTML=`<div class="card"><h2>${esc(user().name)} 的历史词库</h2><div class="filters">${['全部','学习中','需复习','已掌握','已移出'].map(s=>`<button class="chip ${S.hfilter===s?'active':''}" onclick="S.hfilter='${s}';save();render()">${s}</button>`).join('')}</div></div>${list.map(i=>card(i,`<div class="muted">状态：${esc(i.status)} · ${i.isInCurrentBook?'当前生词本中':'不在当前生词本'}</div>`)).join('')||'<div class="card empty">历史词库为空</div>'}`}function renderReview(){let d=dueItems(),soon=current().filter(i=>!d.includes(i));review.innerHTML=`<div class="card"><h2>${esc(user().name)} 的复习计划</h2><p class="muted">间隔重复：当天 → 1天 → 3天 → 7天 → 15天 → 30天。</p></div><div class="card"><h3>今日需复习</h3>${d.map(i=>`<p><b>${esc(i.text)}</b> <span class="tag">阶段${i.masteryLevel}</span></p>`).join('')||'<p class="muted">今天没有到期词。</p>'}</div><div class="card"><h3>即将复习</h3>${soon.map(i=>`<p><b>${esc(i.text)}</b><br><span class="muted">${new Date(i.nextReviewAt).toLocaleString()}</span></p>`).join('')||'<p class="muted">暂无即将复习词。</p>'}</div>`}function render(){renderUsers();document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(S.tab).classList.remove('hidden');due.textContent='今日 '+dueItems().length;nav();({home:renderHome,book:renderBook,test:renderTest,speak:renderSpeak,history:renderHistory,review:renderReview}[S.tab])()}render();</script></body></html>
